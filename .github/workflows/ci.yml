name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: bun install --frozen-lockfile
      - run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: bun install --frozen-lockfile
      - name: Run tests (with JUnit XML reporter)
        run: bunx turbo run test -- --reporter=junit --reporter-outfile=./junit.xml
      - name: Upload JUnit test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: bun-test-reports
          path: '**/junit.xml'
          if-no-files-found: warn
          retention-days: 30
      - name: Publish test results to PR
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        uses: dorny/test-reporter@v1
        with:
          name: bun-test-results
          path: '**/junit.xml'
          reporter: java-junit
          fail-on-error: false
          only-summary: false

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: bun install --frozen-lockfile
      - run: bun run build

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run coverage
      - name: Upload lcov reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: |
            apps/*/coverage/lcov.info
            packages/*/coverage/lcov.info
          if-no-files-found: warn
          retention-days: 30