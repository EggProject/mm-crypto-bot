# GitHub Actions — `mm-crypto-bot` CI
#
# FONTOS: A pipeline három fázisban fut:
#   1. lint + typecheck (párhuzamos)  — gyors visszajelzés a PR-en
#   2. test + coverage                 — Vitest, v8 lefedettség
#   3. build                           — a `turbo run build` topológiai sorrendben
#
# A Bun lockfile-ot és a .turbo cache-t cache-eljük, hogy a második
# futás gyors legyen. Minden futás előtt lefut a `bun install --frozen-lockfile`
# a determinisztikus telepítéshez.

name: CI

on:
  push:
    branches: [main, feat/**, fix/**]
  pull_request:
    branches: [main]

# Egy workflow futás ne halmozódjon fel — mindig a legutóbbit futtatjuk.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # 1. Lint — ESLint flat config, ultra-strict
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun + Turbo
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            **/node_modules
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', '**/package.json', '**/tsconfig.json', '**/tsconfig.base.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

  # --------------------------------------------------------------------------
  # 2. Type-check — tsc ultra-strict (a tsconfig.base.json összes strictness flagja)
  # --------------------------------------------------------------------------
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun + Turbo
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            **/node_modules
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', '**/package.json', '**/tsconfig.json', '**/tsconfig.base.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun run typecheck

  # --------------------------------------------------------------------------
  # 3. Test + coverage — Vitest + @vitest/coverage-v8
  #    A 100%-os threshold későbbi fázisokban lesz enforced — egyelőre a
  #    futás + riport generálás a cél.
  # --------------------------------------------------------------------------
  test:
    name: Test + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun + Turbo
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            **/node_modules
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', '**/package.json', '**/tsconfig.json', '**/tsconfig.base.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            **/coverage/**
          if-no-files-found: ignore

  # --------------------------------------------------------------------------
  # 4. Build — turbo run build, topológiai sorrendben (build függ a ^build-től)
  # --------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, typecheck, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun + Turbo
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            **/node_modules
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', '**/package.json', '**/tsconfig.json', '**/tsconfig.base.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run build
        run: bun run build
