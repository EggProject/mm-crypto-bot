name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-no-warnings:
    name: Install (no-warnings)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: bun install --frozen-lockfile
      - name: bun install must produce zero warnings (no nested overrides)
        run: bun run test:install-warnings

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: bun install --frozen-lockfile
      - run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: bun install --frozen-lockfile
      - name: Run tests (with JUnit XML reporter)
        run: bunx turbo run test -- --reporter=junit --reporter-outfile=./junit.xml
      - name: Upload JUnit test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: bun-test-reports
          path: '**/junit.xml'
          if-no-files-found: warn
          retention-days: 30
      - name: Publish test results to PR
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        uses: dorny/test-reporter@v1
        with:
          name: bun-test-results
          path: '**/junit.xml'
          reporter: java-junit
          fail-on-error: false
          only-summary: false

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: bun install --frozen-lockfile
      - run: bun run build

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: sudo apt-get update && sudo apt-get install -y lcov
      - run: bun run coverage
      # PHASE 35c: per-package OWN 100% line coverage check using the
      # STANDARD `lcov` C tool. The script `coverage-per-package.sh`
      # uses `lcov --remove "*../*"` to strip cross-package imports
      # from each per-package lcov, then `lcov --summary --fail-under-
      # lines 100` to fail if any OWN file is below 100%. This is the
      # canonical lcov tool, no custom code, no AST analysis. The
      # merged report (run separately via `bun run coverage:full`) is
      # informational only — it aggregates imports too, and getting
      # it to 100% would require 50+ new test files (multi-week
      # scope, not a one-PR fix).
      - name: Per-package OWN 100% line coverage (standard lcov)
        run: bun run coverage:per-package
      - name: Merge lcov reports (standard lcov --add-tracefile)
        run: bun run coverage:merge
      - name: Print merged coverage summary (informational)
        run: bun run coverage:report
      - name: Upload lcov reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: |
            apps/*/coverage/lcov.info
            packages/*/coverage/lcov.info
            coverage/merged/lcov.info
          if-no-files-found: warn
          retention-days: 30

  # PHASE 48D: Playwright e2e suite for the apps/web dashboard.
  # The 20-min `timeout-minutes:` is the user-mandated hard cap
  # (2026-07-17 00:08) — if the suite doesn't finish in 20 min,
  # GitHub Actions kills the job. The `e2e:full` script (in
  # apps/web/package.json) is reserved for nightly/manual runs
  # with a 30-min cap (not wired to a separate job here; the
  # default `e2e` script is the CI-bound one).
  e2e-playwright:
    name: e2e (Playwright + MSW + coverage gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/bun.lock', 'bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      # PHASE 58.5: Component Tests (CT) run BEFORE the e2e suite
      # so that the CT coverage data is available for the e2e
      # `afterAll` to merge. The CT lane writes per-page coverage
      # JSONs to `apps/web/.nyc_output/playwright_ct_*.json` (via
      # the `vite-plugin-istanbul` `ctViteConfig.plugins` + the
      # `addInitScript`/`exposeFunction` pattern in
      # `apps/web/e2e-ct/_helpers/coverage.ts`).
      - name: Run Playwright Component Tests (CT, populates .nyc_output)
        id: e2e-ct
        run: cd apps/web && bun run e2e:ct
        timeout-minutes: 10
      - name: Verify CT coverage files exist before upload
        run: ls -la apps/web/.nyc_output/ || echo "no dir"
      - name: Upload Playwright CT coverage (.nyc_output)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-ct-coverage
          path: apps/web/.nyc_output
          if-no-files-found: warn
          retention-days: 30
      - name: Run Playwright e2e suite (20-min suite timeout, coverage gate)
        id: e2e
        run: cd apps/web && bun run e2e
        timeout-minutes: 20
      - name: Upload Playwright coverage (lcov + json-summary + html)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-coverage
          path: |
            apps/web/coverage/playwright/coverage-final.json
            apps/web/coverage/playwright/report/lcov.info
            apps/web/coverage/playwright/report/coverage-summary.json
            apps/web/coverage/playwright/report/html
          if-no-files-found: warn
          retention-days: 30
      - name: Upload Playwright HTML test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: apps/web/coverage/playwright/html-report
          if-no-files-found: warn
          retention-days: 30
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && github.ref != 'refs/heads/main'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: playwright-coverage
          message: |
            **Playwright e2e coverage (apps/web)**

            | Metric | Coverage | Threshold |
            | --- | --- | --- |
            | Lines | see coverage-summary.json | 95% |
            | Branches | see coverage-summary.json | 90% |
            | Functions | see coverage-summary.json | 95% |

            Full report: `apps/web/coverage/playwright/report/html/index.html`
            (attached as the `playwright-coverage` artifact).