  - id: 'phase10g-track-b-risk-telemetry'
    title: 'Phase 10G Track B — Portfolio risk engine + per-strategy telemetry (Strategy Specialist)'
    prompt: |
      You are the **Strategy Specialist agent** working on Phase 10G Track B of the mm-crypto-bot project.
      Your job: build the cross-strategy portfolio risk engine + per-strategy telemetry,
      so the signal center has observability and the 1:10 leverage mandate has defense-in-depth.

      ## Context — why this track exists
      Phase 9 V4 had per-strategy VaR but no cross-strategy risk computation. If you compose
      3-5 strategies, their individual Sharpe might look fine but the combined portfolio
      could concentrate risk (correlated drawdowns, double-leveraged carry, etc.). Track B
      builds the cross-strategy risk engine + telemetry that watches the WHOLE signal bus.

      Read these files FIRST, in order:
      1. `/Users/kiscsicska/projects/mm-crypto-bot/.mavis/notes/phase10-scope-plan.md` — scope plan (10G.3 + 10G.5 sections)
      2. `/Users/kiscsicska/projects/mm-crypto-bot/packages/core/src/risk/vol-targeted-sizer.ts` — Phase 8 Track G (per-strategy sizing)
      3. `/Users/kiscsicska/projects/mm-crypto-bot/packages/core/src/risk/kelly-adaptive.ts` — Phase 7 Track B (per-strategy Kelly)
      4. `/Users/kiscsicska/projects/mm-crypto-bot/packages/core/src/strategy/multi-class-ensemble-v4.ts` — current V4 architecture
      5. `/Users/kiscsicska/projects/mm-crypto-bot/backtest-results/REPORT-phase9.md` — V4 baseline numbers (for cross-strategy reference)
      6. `/Users/kiscsicska/.mavis/agents/mavis/memory/MEMORY.md` — 1:10 mandate + risk discipline rules
      7. Existing risk module patterns in `packages/core/src/risk/`

      ## Your scope — Track B: Portfolio risk engine + telemetry

      ### Setup
      1. Worktree: `/Users/kiscsicska/projects/mm-crypto-bot/.worktrees/wt-phase10g-track-b`
         - Create: `cd /Users/kiscsicska/projects/mm-crypto-bot && git worktree add .worktrees/wt-phase10g-track-b -b feat/phase10g-track-b-risk-telemetry main`
      2. Branch yours alone

      ### Deliverables (MUST PRODUCE ALL)
      1. `packages/core/src/risk/portfolio-risk-engine.ts` — NEW (~400 LOC)
         - Subscribes to SignalBus events (`SizingSignal`, `CarrySignal`, `RiskSignal`, `DirectionSignal`)
         - Maintains rolling 30d cross-strategy correlation matrix
         - Computes:
           - `portfolioVaR(signalStream, confidence=0.95): number` — daily VaR across all positions
           - `crossStrategyCorrelation(): CorrelationMatrix` — Pearson correlations between per-strategy returns
           - `aggregateDrawdown(state): number` — running portfolio drawdown (not per-strategy)
           - `exposureBySymbol(): Map<Symbol, number>` — concentration check
           - `leverageInvariantGuard(signal: SizingSignal): boolean` — returns false if signal would breach 1:10 mandate
         - **1:10 MANDATORY ENFORCEMENT**: `leverageInvariantGuard` is the defense-in-depth layer
           - Reads ALL active SizingSignals from bus snapshot
           - Sum effective notionals → divide by base capital → assert ≤ 10×
           - If breach detected, emits a `RiskSignal { kind: 'risk', drawdownLimit: ... , varDaily95: ... , source: 'leverage-invariant-guard' }`
         - Position-size conflict resolver: when 2+ signals claim sizing for same symbol, take MIN (most conservative)

      2. `packages/core/src/risk/leverage-invariant.ts` — NEW (~150 LOC)
         - Extracted 1:10 mandate enforcement
         - `assertLeverageInvariant(totalEffectiveNotional: number, baseCapital: number): void` — throws if > 10×
         - `computeEffectiveLeverage(positions: Position[]): number` — helper
         - `LeverageBreachError` class with details
         - **THIS IS THE HARD GUARDRAIL** — referenced from memory rule, must be enforced at 3 layers: CLI parser, signal-center constructor, this invariant guard

      3. `packages/core/src/risk/portfolio-risk-engine.test.ts` — NEW (≥15 unit tests)
         - VaR computation correctness
         - Correlation matrix rolling window
         - Aggregate drawdown across N strategies
         - Exposure concentration detection
         - **Leverage invariant guard: 1:10 enforcement**, including:
           - Single signal at 10× → OK
           - Two signals summing to 11× → BREACH detected, RiskSignal emitted
           - Reducing signal at 9× → under cap, OK
         - Conflict resolver: 2 signals claim same symbol → min notional wins
         - Empty bus snapshot → no breach
         - Historical breach replay (load past signal stream, verify guard fires)
         - Determinism
         - Edge cases: 0 strategies, 1 strategy, 100 strategies

      4. `packages/core/src/risk/leverage-invariant.test.ts` — NEW (≥10 unit tests)
         - 10× exactly → no throw
         - 10.001× → throw LeverageBreachError
         - 1× → no throw
         - 0× → no throw
         - Negative notional → invalid (defensive)
         - Zero capital → invalid (defensive)
         - Compute effective leverage from positions array
         - Edge cases: NaN, Infinity, very large numbers

      5. `packages/core/src/telemetry/strategy-telemetry.ts` — NEW (~350 LOC)
         - Per-strategy PnL attribution: which strategy contributed which dollars
         - Per-strategy Sharpe + drawdown
         - Cross-strategy correlation matrix (live updating)
         - State snapshot for monitoring (JSON-serializable)
         - Strategy kill-switch interface (disable a plugin mid-flight)
         - CSV/JSON export for offline analysis
         - Subscribes to all SignalBus events, derives attribution

      6. `packages/core/src/telemetry/strategy-telemetry.test.ts` — NEW (≥10 unit tests)
         - PnL attribution correctness across 2-3 strategies
         - Per-strategy Sharpe rolling window
         - Cross-strategy correlation update on each new bar
         - State snapshot serializability
         - Kill-switch: disable plugin mid-flight, verify no further signals emitted
         - CSV export formatting
         - JSON export schema
         - Determinism
         - Edge cases: 0 strategies, missing data, single bar

      7. `packages/core/src/index.ts` — exports updated
         - Add: `PortfolioRiskEngine`, `LeverageInvariantError`, `StrategyTelemetry`, types

      8. `packages/backtest-tools/src/cli/run-portfolio-risk.ts` — NEW CLI runner (~250 LOC)
         - Args: `--symbol=<BTC|ETH|SOL>/USDT --timeframe=1d --output=<PATH> --strategies=carry,mtf,vol-target`
         - Loads OHLCV + funding data
         - Instantiates: SignalBus + StrategyRegistry + PortfolioRiskEngine + StrategyTelemetry + 2-3 simple strategy plugins (use existing V4 strategies as pluggable strategies)
         - Runs, emits risk + telemetry JSON per bar + final summary
         - Mimics `run-multi-class-baseline-v4.ts` pattern

      9. `backtest-results/baseline-portfolio-risk-{btc,eth,sol}-1d.json` — 3 NEW backtest JSON files
         - Each JSON: portfolio VaR 95% daily (≤ 2%), per-strategy VaR, correlation matrix, aggregate drawdown, leverage invariant guard fires count, exposure by symbol, telemetry snapshot, kill-switch invocations (0 expected)
         - **Reference comparison**: vs V4 per-strategy VaR (`baseline-multi-class-v4-{sym}-1d.json`)
         - Demonstrates: cross-strategy risk = lower than sum of per-strategy risk (diversification)

      10. `docs/research/phase10g-portfolio-risk.md` — empirical report (English research, Hungarian intro/conclusion OK)
          - **Minimum 5-10 web queries** on: portfolio VaR vs per-strategy VaR, correlation matrix rolling windows, risk parity, Markowitz portfolio construction, Kelly with correlation matrix, real-time risk monitoring systems, kill-switch design patterns, observability for trading systems
          - **≥3 independent sources per empirical claim**
          - Empirical results table: 3 baseline × portfolio VaR, per-strategy VaR, correlation matrix, drawdown, leverage invariant fires
          - Diversification analysis: portfolio VaR < sum of per-strategy VaR
          - Kill-switch test: verify plugin can be disabled mid-flight
          - 1:10 mandate enforcement verification (the guard fires on synthetic 11× signal)
          - Comparison: per-strategy risk vs cross-strategy risk
          - Deployment readiness

