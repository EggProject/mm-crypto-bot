  - id: 'phase10g-track-a-signal-bus-plugins'
    title: 'Phase 10G Track A — Central signal bus + strategy registry + sample carry plugin (Coder)'
    prompt: |
      You are the **Coder agent** working on Phase 10G Track A of the mm-crypto-bot project.
      Your job: build the architectural skeleton for the Signal Center — typed event bus
      + strategy plugin registry + one reference plugin that proves the interface works.

      ## Context — why this track exists
      Phase 1-9 produced 4-5 isolated strategies composed into "ensembles" additively.
      There was no central signal router, no plugin interface, no shared event bus.
      Phase 10G Track A is the foundation: typed pub/sub for strategy signals, a
      strategy registry where new alpha streams can be dropped in, and a reference
      plugin (carry baseline) that proves the interface works end-to-end against
      the existing V4 carry strategy.

      Read these files FIRST, in order:
      1. `/Users/kiscsicska/projects/mm-crypto-bot/docs/research/phase10-scope-plan.md` — authoritative scope plan
      2. `/Users/kiscsicska/projects/mm-crypto-bot/.mavis/notes/phase10-scope-plan.md` — same scope (project notes)
      3. `/Users/kiscsicska/projects/mm-crypto-bot/packages/core/src/strategy/multi-class-ensemble-v4.ts` — current V4 to understand signal flow today
      4. `/Users/kiscsicska/projects/mm-crypto-bot/packages/core/src/strategy/funding-carry-leverage.ts` — the existing carry strategy you'll wrap as a reference plugin
      5. `/Users/kiscsicska/projects/mm-crypto-bot/packages/core/src/strategy/funding-carry-timing.ts` — funding timing logic
      6. `/Users/kiscsicska/.mavis/agents/mavis/memory/mm-crypto-bot-project.md` — project conventions
      7. Existing test patterns in `packages/core/src/strategy/*.test.ts` — mimic test structure

      ## Your scope — Track A: Signal bus + plugin registry + sample plugin

      ### Setup
      1. Worktree: `/Users/kiscsicska/projects/mm-crypto-bot/.worktrees/wt-phase10g-track-a`
         - Create: `cd /Users/kiscsicska/projects/mm-crypto-bot && git worktree add .worktrees/wt-phase10g-track-a -b feat/phase10g-track-a-signal-bus main`
         - All your work happens here
         - Base branch is `main`
      2. The branch is yours alone — no other worker touches it

      ### Deliverables (MUST PRODUCE ALL)
      1. `packages/core/src/signal-center/types.ts` — NEW (~150 LOC)
         - Define discriminated unions for Signal types:
           - `DirectionSignal { kind: 'direction'; side: 'long' | 'short' | 'flat'; strength: number; source: string }`
           - `CarrySignal { kind: 'carry'; fundingRate: number; regime: 'high' | 'neutral' | 'flip'; source: string }`
           - `SizingSignal { kind: 'sizing'; kellyFraction: number; volMultiplier: number; notional: number; source: string }`
           - `RiskSignal { kind: 'risk'; varDaily95: number; correlationPenalty: number; drawdownLimit: number; source: string }`
         - Define `Signal = DirectionSignal | CarrySignal | SizingSignal | RiskSignal` discriminated union
         - Type guard helpers: `isDirection(s: Signal)`, etc.
         - Export `SignalKind` enum

      2. `packages/core/src/signal-center/signal-bus.ts` — NEW (~250 LOC)
         - Event-driven pub/sub for typed Signal events
         - API:
           - `class SignalBus`
           - `subscribe(kind: SignalKind, handler: (s: Signal) => void): UnsubscribeFn`
           - `emit(s: Signal): void` — synchronous for backtest mode, batched for live mode (configurable)
           - `mode: 'backtest' | 'live'` — controls emit semantics
           - `snapshot(): Signal[]` — for telemetry/debugging
           - `clear(): void` — for backtest re-runs
         - Determinism: backtest mode MUST be fully deterministic (same input → same output, in order)
         - Latency tracking: emit timestamps, expose `latencyMs()` for live-mode observability

      3. `packages/core/src/signal-center/signal-bus.test.ts` — NEW (≥15 unit tests)
         - Subscribe + emit basic flow
         - Multiple subscribers on same kind
         - Unsubscribe mid-stream
         - Discriminated union type narrowing (Direction vs Carry handlers)
         - Backtest mode determinism (same input → same output)
         - Live mode latency tracking
         - Snapshot captures all signals
         - Clear resets state
         - Edge cases: emit before subscribe (no error), subscribe to non-existent kind (error)
         - Concurrent emit ordering (FIFO guarantee in backtest mode)
         - Type guard correctness for each Signal kind
         - Backpressure handling in live mode (if emit > N per second, batch)

      4. `packages/core/src/signal-center/strategy-registry.ts` — NEW (~200 LOC)
         - Defines `StrategyPlugin` interface:
           - `metadata: { name: string; version: string; edgeClass: 'directional' | 'carry' | 'sizing' | 'risk' | 'mixed'; capitalRequirement: number; maxLeverage: number }`
           - `subscribe(bus: SignalBus): void` — wire handlers
           - `onBar(bar: Bar, state: PluginState): void` — main update (called by central runner)
           - `validateConfig(config: unknown): Result<void, ConfigError>` — boot-time validation
         - `class StrategyRegistry`
           - `register(plugin: StrategyPlugin): void` — adds to registry
           - `unregister(name: string): void` — removes (for live mode kill-switch)
           - `get(name: string): StrategyPlugin | undefined`
           - `list(): StrategyPluginMetadata[]`
           - `wireAll(bus: SignalBus): void` — calls `subscribe(bus)` on every registered plugin
           - `validateAll(): Result<void, AggregatedConfigError>` — boot-time validation

      5. `packages/core/src/signal-center/strategy-registry.test.ts` — NEW (≥10 unit tests)
         - Register + get + list
         - Unregister mid-flight
         - Wire all plugins to bus
         - Validation: valid + invalid configs
         - Aggregated config errors (collect all errors, not first-fail)
         - Duplicate registration rejected
         - Plugin metadata validation (maxLeverage MUST be ≤ 10 — see 1:10 mandate below)
         - Edge cases: empty registry, register/unregister race

      6. `packages/core/src/signal-center/plugins/carry-baseline-plugin.ts` — NEW (~300 LOC)
         - Reference plugin that wraps the existing `FundingCarryLeverageStrategy` (Phase 7 Track C) + `FundingCarryTiming` (Phase 8 Track E)
         - Subscribes to its own carry signals on the bus
         - Emits `CarrySignal` when funding regime changes (high → neutral → flip)
         - Emits `SizingSignal` based on adaptive Kelly × vol-target hybrid
         - **CRITICAL 1:10 MANDATE**: this plugin's effective leverage MUST stay ≤ 10× (volMultiplier ≤ 1.0 on top of 1:10 base; carry leverage capped at 10× max)
         - Plugin metadata `maxLeverage: 10`
         - Uses existing `FundingCarryLeverageStrategy` config interface (no new params)

      7. `packages/core/src/signal-center/plugins/carry-baseline-plugin.test.ts` — NEW (≥10 unit tests)
         - Subscribe + emit integration with SignalBus
         - Carry signal emission on regime change
         - Sizing signal respects adaptive Kelly × vol-target
         - **1:10 leverage invariant**: any emitted SizingSignal has `notional ≤ baseNotional × 10`
         - Metadata declares `maxLeverage: 10`
         - Config validation rejects leverage > 10
         - Determinism (same input bar sequence → same signal sequence)
         - Plugin state survives across bars
         - Edge cases: extreme funding regime, zero vol period, missing data

      8. `packages/core/src/index.ts` — exports updated
         - Add: `SignalBus`, `StrategyRegistry`, `StrategyPlugin` interface, `CarryBaselinePlugin`, all Signal types and type guards
         - Follow existing export patterns

      9. `packages/backtest-tools/src/cli/run-signal-center-bus.ts` — NEW CLI runner (~200 LOC)
         - Args: `--symbol=<BTC|ETH|SOL>/USDT --timeframe=1d --output=<PATH> --plugin=carry-baseline`
         - Loads OHLCV + funding data, instantiates SignalBus + StrategyRegistry + CarryBaselinePlugin
         - Runs the plugin against historical bars, collects emitted signals
         - Outputs: per-bar signal log + final PnL using existing carry-leverage backtest logic
         - Mimics `run-multi-class-baseline-v4.ts` pattern for CLI structure

      10. `backtest-results/baseline-signal-center-bus-{btc,eth,sol}-1d.json` — 3 NEW backtest JSON files
         - Each JSON: total return %, monthly return %, Sharpe, max DD %, total signals emitted (by kind), bus latency stats (backtest mode target: 0ms deterministic), carry timing entry count, avg effective leverage (must be ≤ 10), VaR 95% daily (must be ≤ 2%)
         - **Reference comparison**: vs `baseline-multi-class-v4-{sym}-1d.json` (Phase 9 V4)
         - Expected: very close to V4 results (we wrapped V4's carry in the signal center interface, didn't change logic)

      11. `docs/research/phase10g-signal-bus.md` — empirical report (English research, Hungarian intro/conclusion OK)
          - **Minimum 5-10 web queries** on: event-driven architecture for trading systems, pub/sub for financial signal routing, plugin architecture for quant systems, in-process message bus latency, type-safe discriminated unions in trading, signal bus patterns (Kafka/RabbitMQ/NATS), Reactor/Disruptor pattern for low-latency
          - **≥3 independent sources per empirical claim**
          - Empirical results table: 3 baseline × PnL, Sharpe, max DD, signal count by kind, latency stats
          - Architecture diagram (text-based): SignalBus + Registry + CarryBaselinePlugin + Risk/Telemetry subscribers (Track B will wire in)
          - Comparison: V4 baseline vs SC-bus baseline (architecture parity check)
          - Type-safety analysis: how discriminated unions prevent runtime signal-type confusion
          - 1:10 leverage invariant verification (≤10× across all 3 baselines)
          - Deployment readiness: backtest mode vs live mode semantics, what changes for production
          - Future drop-in plugin roadmap (Track B's risk engine will subscribe to all signals for cross-strategy monitoring)

      ### Quality gates (MUST PASS before commit)
      ```bash
      cd /Users/kiscsicska/projects/mm-crypto-bot/.worktrees/wt-phase10g-track-a
      bun install --frozen-lockfile
      bun run typecheck
      bun run lint
      bun run test
      bun run coverage
      ```
      ALL must be green. Signal bus + registry modules should have ≥95% line + function coverage.

      ### Commit + push
      ```
      git add -A
      git commit -m "feat(core,backtest-tools): ÜGYNÖK Phase 10G Track A — signal bus + strategy registry + carry plugin

      - signal-center/{signal-bus,strategy-registry,types}: typed pub/sub + plugin interface
      - signal-center/plugins/carry-baseline-plugin: V4 carry wrapped as reference plugin
      - 3 baseline JSON (BTC/ETH/SOL × 1d) — architecture parity vs V4
      - 1:10 leverage invariant enforced at plugin level

      Backtest results: <kulcs számok>"
      git push -u origin feat/phase10g-track-a-signal-bus
      ```

      ### Report back to root
      ```
      mavis communication send \
        --from <YOUR_SESSION_ID> \
        --to mvs_c13fe65cb68f4df3851304dea09a9099 \
        --command prompt \
        --content "PHASE 10G Track A (signal bus + plugins) COMPLETE. <részletek, baseline numbers, signals emitted by kind>"
      ```

      ### Important constraints
      - **DO NOT** open a PR (root session does that after all tracks land)
      - **DO NOT** touch files outside your scope: signal-center/* + tests + CLI + baseline JSONs + phase10g-signal-bus.md + packages/core/src/index.ts (just exports)
      - **1:10 leverage MANDATORY** — every emitted SizingSignal must respect the cap. Plugin metadata `maxLeverage: 10` is a hard assertion.
      - **Decision autonomy**: pick the signal type set, the backtest/live mode semantics, and the plugin interface shape — document choices in the report with reasoning.
      - **Honest report**: if the signal bus doesn't improve V4 (it shouldn't, it's plumbing), say so. The value is the platform, not the immediate envelope.
