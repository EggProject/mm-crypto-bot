      - telemetry/strategy-telemetry: PnL attribution + Sharpe + kill-switch
      - 3 baseline JSON (BTC/ETH/SOL × 1d) — diversification visible in portfolio VaR

      Backtest results: <kulcs számok>"
      git push -u origin feat/phase10g-track-b-risk-telemetry
