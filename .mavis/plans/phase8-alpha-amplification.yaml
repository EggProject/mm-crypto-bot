      ## Your scope — Track E: Funding-rate timing strategy
      Wrap the existing FundingCarryStrategy / FundingCarryLeverageStrategy with
      a regime-aware timing filter: only enter carry when funding rate is in the
      "high-yield" regime, exit to neutral cash when it falls.

      ### Setup
