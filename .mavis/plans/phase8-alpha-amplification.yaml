      on funding rate dynamics — only enter when funding > 30d rolling 75th percentile,
      exit when funding drops below 30d median. This should reduce drawdowns AND
      improve on-time Sharpe by filtering out negative-funding periods.

      Read these files FIRST, in order:
      1. `/Users/kiscsicska/projects/mm-crypto-bot/docs/research/phase7-strategy-brief.md` — Phase 7 brief §6 (funding carry section)
