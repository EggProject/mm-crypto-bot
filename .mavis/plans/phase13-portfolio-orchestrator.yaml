      ### 1. Decision Engine — `packages/core/src/signal-center/decision-engine.ts` (NEW, ~400 LOC)

      Class `DecisionEngine` — SignalBus subscriber that arbitrates between plugins' signals and emits final PositionDecisions.

      Public interface:
      ```typescript
      export interface DecisionEngineConfig {
        readonly defaultWeight: number;       // default 1.0
        readonly defensiveWeight: number;      // default 2.0 (RegimeDetector, PerpDexLiq, SOLFlipKS)
        readonly minConsensusStrength: number; // default 0.3
        readonly maxNotionalPerSymbolUsd: number; // default 10000
      }

      export interface PositionDecision {
        readonly symbol: string;
        readonly side: 'long' | 'short' | 'flat';
        readonly notionalUsd: number;
        readonly sizeMultiplier: number;       // combined vol × kelly × regime multiplier
        readonly confidence: number;            // 0..1, weighted vote score
        readonly sourceWeights: Record<string, number>; // pluginName → weight
        readonly timestampMs: number;
      }

      export class DecisionEngine {
        constructor(config: Partial<DecisionEngineConfig>);
        subscribe(bus: SignalBus): UnsubscribeFn;     // subscribes to all 4 signal kinds
        decisions(): readonly PositionDecision[];     // chronological
        latestDecision(symbol: string): PositionDecision | null;
        reset(): void;                                // for backtest re-runs
      }
      ```

      Arbitration rules (agent-default, document each in JSDoc):
      - **All directional signals agree** → execute with weighted-average size
      - **Directional conflict** (e.g., long + short) → flat OR weighted majority side
      - **Risk signal `sizeModifier < 1.0`** → applies to ALL outgoing decisions (multiplier wins)
      - **Carry signal** → adjusts `sizeMultiplier` (high=1.2, neutral=1.0, flip=0.5) — does NOT veto direction
      - **Factor/snapshot signals** (P1/E1/M1) → informational only, never vetoes, never contributes to weight
      - **Defensive plugins** (RegimeDetector, PerpDexLiq, SOLFlipKS) get weight 2.0
      - **Min consensus strength** 0.3 — below this, decision = flat

      **Type safety:**
      - Add `assertNever(x: never): never` helper for exhaustive switch on SignalKind
      - All `switch (signal.kind)` must hit `assertNever` in default case → compile-time exhaustiveness

      Tests in `decision-engine.test.ts` (≥25 tests):
