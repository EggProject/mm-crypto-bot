      - Long+short conflict → side='flat' OR majority
      - Risk signal with sizeModifier=0.5 → applied to all decisions
      - Carry signal flip regime → sizeMultiplier scaled 0.5
      - Defensive plugin weight 2.0 vs directional weight 1.0 → defensive wins on conflict
      - Min consensus threshold (below 0.3 → flat)
      - Factor/snapshot signals ignored in arbitration
      - subscribe/unsubscribe lifecycle
      - reset() clears decisions
      - Type exhaustiveness (compile-time check via assertNever)
      - Edge cases: empty bus, single signal, 3+ conflicting signals
