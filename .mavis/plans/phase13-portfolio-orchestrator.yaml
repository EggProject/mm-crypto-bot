      ### Plugin 1 — `cross-symbol-spread-reversion-plugin.ts`

      **Edge class:** directional
      **Logic:** BTC-ETH log-spread z-score mean reversion
      - Compute `spread = log(BTC/ETH)` over rolling 30d window
      - Compute z-score: `z = (spread - mean) / stddev`
      - If `z > 2` → emit DirectionSignal side='short' on BTC + side='long' on ETH (mean reversion expects spread to normalize)
      - If `z < -2` → emit DirectionSignal side='long' on BTC + side='short' on ETH
      - `strength = min(abs(z) / 3, 1.0)`
      - Min holding period: 5 bars (avoid whipsaw)

      **Configuration:**
      ```typescript
      export interface CrossSymbolSpreadReversionConfig {
        readonly windowDays: number;            // default 30
        readonly zEntryThreshold: number;       // default 2.0
        readonly zExitThreshold: number;        // default 0.5
        readonly minHoldBars: number;           // default 5
        readonly baseNotionalUsd: number;       // default 10000
        readonly enabledPairs: readonly [string, string][]; // default [['BTC/USDT', 'ETH/USDT']]
      }
      ```

      Tests (≥20): z-score computation, entry/exit thresholds, hold period, cross-symbol emission, strength calculation, reset, edge cases.

      ### Plugin 2 — `cross-symbol-momentum-overlay-plugin.ts`

      **Edge class:** directional
      **Logic:** BTC+ETH both long/flat on BTC 20d momentum
      - Compute BTC 20d momentum = (BTC_now / BTC_20d_ago) - 1
      - If `momentum > 0.05` (5%) → emit DirectionSignal side='long' on BTC + side='long' on ETH
      - If `momentum < -0.05` (-5%) → emit DirectionSignal side='flat' on both (close longs)
      - Else: flat (no signal)
      - `strength = min(abs(momentum) / 0.10, 1.0)`

      **Configuration:**
      ```typescript
      export interface CrossSymbolMomentumOverlayConfig {
        readonly lookbackDays: number;          // default 20
        readonly momentumThreshold: number;     // default 0.05
        readonly baseNotionalUsd: number;       // default 10000
        readonly enabledSymbols: readonly string[]; // default ['BTC/USDT', 'ETH/USDT']
      }
      ```

      Tests (≥20): momentum calculation, threshold logic, multi-symbol emission, strength calc, reset.

      ### Plugin 3 — `cross-symbol-funding-differential-plugin.ts`

      **Edge class:** carry
      **Logic:** Long-spot higher funding + short-spot lower funding → cross-neutral carry
      - For each enabled symbol pair (e.g., BTC vs ETH):
        - Read latest funding rate (decimal, e.g., 0.0001 = 1bp per 8h)
        - Compute differential: `differential = fundingHigh - fundingLow`
      - Emit DirectionSignal:
        - `side='short'` on HIGH funding (you collect funding as the short side) + `side='long'` on LOW funding (you pay funding as the long side, but lower)
      - Emit CarrySignal with `regime='high'` if differential > 0.0001 (10bp per 8h)

      **Configuration:**
      ```typescript
      export interface CrossSymbolFundingDifferentialConfig {
        readonly minDifferentialPer8h: number;  // default 0.0001 (10bp)
        readonly baseNotionalUsd: number;       // default 10000
        readonly enabledPairs: readonly [string, string][]; // default [['BTC/USDT', 'ETH/USDT']]
      }
      ```

      Tests (≥20): funding differential calc, signal direction correctness, regime emit, multi-pair, reset.

