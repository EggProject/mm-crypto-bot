      ### 2. Generate cap-vs-DD plot

      Location: `/Users/kiscsicska/projects/mm-crypto-bot/docs/research/phase19-cap-sweep.png`

      Use matplotlib (Python) or a JS plotting library. Plot must show:
      - X-axis: cap value (0.04, 0.08, 0.10, 0.12, 0.15, 0.20-ref)
      - Y-axis (left): monthly return % portfolio average
      - Y-axis (right): max DD % portfolio average
      - Two lines: 2-of-2 mode (solid) and 1-of-2 mode (dashed)
      - Markers per cap value
      - 8% DD threshold line (horizontal dashed red)
      - +30%/mo target line (horizontal dashed green)
      - Title: "Phase 19 Cap Sweep — Return vs DD by Cap Value"
      - Legend
      - File size must be > 10KB

      Python sketch:
      ```python
      #!/usr/bin/env python3
      import json, glob, os
      import matplotlib.pyplot as plt

      caps = [0.04, 0.08, 0.10, 0.12, 0.15, 0.20]
      results_2of2 = {}  # cap -> portfolio avg
      results_1of2 = {}
      dd_2of2 = {}
      dd_1of2 = {}

      for mode in ['2of2', '1of2']:
        for cap in caps:
          mrets, dds = [], []
          for sym in ['btc', 'eth', 'sol']:
            fname = f'backtest-results/phase19-cap-sweep-{mode}-{sym}-15m-{cap}.json'
            if not os.path.exists(fname):
              continue
            with open(fname) as f:
              d = json.load(f)
            mrets.append(d['monthlyReturn'] * 100)
            dds.append(d['result']['maxDrawdown'] * 100)
          if mode == '2of2':
            results_2of2[cap] = sum(mrets) / len(mrets) if mrets else None
            dd_2of2[cap] = max(dds) if dds else None
          else:
            results_1of2[cap] = sum(mrets) / len(mrets) if mrets else None
            dd_1of2[cap] = max(dds) if dds else None

      fig, ax1 = plt.subplots(figsize=(10, 6))
      ax1.set_xlabel('maxPositionPctEquity (cap)')
      ax1.set_ylabel('Portfolio avg monthly return (%)', color='tab:blue')
      ax2 = ax1.twinx()
      ax2.set_ylabel('Portfolio max DD (%)', color='tab:red')

      for mode, results, color, ls in [('2-of-2', results_2of2, 'tab:blue', '-'), ('1-of-2', results_1of2, 'tab:cyan', '--')]:
        xs = sorted(results.keys())
        ys = [results[x] for x in xs]
        ax1.plot(xs, ys, marker='o', color=color, linestyle=ls, label=f'{mode} return')
      for mode, dds, color, ls in [('2-of-2', dd_2of2, 'tab:red', '-'), ('1-of-2', dd_1of2, 'tab:orange', '--')]:
        xs = sorted(dds.keys())
        ys = [dds[x] for x in xs]
        ax2.plot(xs, ys, marker='s', color=color, linestyle=ls, label=f'{mode} DD')

      ax1.axhline(y=30, color='green', linestyle=':', label='+30%/mo target')
      ax2.axhline(y=8, color='red', linestyle=':', label='8% DD threshold')

      plt.title('Phase 19 Cap Sweep — Return vs DD by Cap Value')
      fig.legend(loc='upper right', bbox_to_anchor=(0.9, 0.9))
      plt.tight_layout()
      plt.savefig('docs/research/phase19-cap-sweep.png', dpi=100)
      ```

      Adapt as needed. The plot is the primary visual deliverable for Phase 19.

