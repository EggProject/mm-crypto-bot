      identical to Phase 15. Phase 17 Track A fixes this by multiplying `riskPerTrade` by
      `signal.confidence` before calling `positionNotionalUsd`.

      Read these files FIRST, in order:
      1. `/Users/kiscsicska/projects/mm-crypto-bot/.mavis/notes/phase17-scope-plan.md` — authoritative scope
      2. `/Users/kiscsicska/projects/mm-crypto-bot/packages/backtest/src/engine.ts` — lines 235-280 (signal → position sizing call site)
      3. `/Users/kiscsicska/projects/mm-crypto-bot/packages/backtest/src/position-size.ts` — `positionNotionalUsd` function
      4. `/Users/kiscsicska/projects/mm-crypto-bot/packages/backtest/src/types.ts` — `PositionSizeConfig`, `BacktestOptions`
      5. `/Users/kiscsicska/projects/mm-crypto-bot/packages/core/src/types.ts` — `StrategySignal` interface (confidence field)
      6. Memory: `/Users/kiscsicska/.mavis/agents/mavis/memory/mm-crypto-bot-project.md`

      ## Setup

      - Worktree: `/Users/kiscsicska/projects/mm-crypto-bot/.worktrees/wt-phase17-a`
      - Create: `cd /Users/kiscsicska/projects/mm-crypto-bot && git worktree add .worktrees/wt-phase17-a -b feat/phase17-a-confidence-wiring main`
      - Base branch: `main` (HEAD `baf821c` from Phase 16)
      - The branch is yours alone

      ## Deliverables (MUST PRODUCE ALL)

      ### 1. Modify `packages/backtest/src/engine.ts` (~+5 LOC net)

      At the `positionNotionalUsd` call site (around line 252), multiply `riskPerTrade` by `signal.confidence`:

      ```typescript
      // BEFORE (approx line 252-257):
      const notional = positionNotionalUsd(
        equity,
        ltfCandle.close,
        signal.stopLoss,
        opts.positionSize,
      );

      // AFTER:
      const confidenceScaledRisk = opts.positionSize.riskPerTrade * signal.confidence;
      const notional = positionNotionalUsd(
        equity,
        ltfCandle.close,
        signal.stopLoss,
        { ...opts.positionSize, riskPerTrade: confidenceScaledRisk },
      );
      ```

      - Confirm the exact line numbers by reading engine.ts first
      - Keep the rest of the engine unchanged
      - Add a comment above the fix explaining: `// Phase 17: scale riskPerTrade by signal.confidence so strategy-side confidence affects position sizing (fixes Phase 16 no-op cap finding)`

      ### 2. Add tests in `packages/backtest/src/engine.test.ts`

      If `engine.test.ts` doesn't exist, create it with a minimal backtest setup (reuse patterns from `position-size.test.ts`).
      Add exactly 5 tests for the confidence wiring:

      1. `confidence=1.0 → riskPerTrade unchanged` — verify deep entries (conf=1.0) get full risk
      2. `confidence=0.7 → riskPerTrade scaled to 70%` — verify shallow entries (pivot S1/R1) get 70% risk
      3. `confidence=0.0 → position size = minNotional` — zero-confidence signal suppressed to minimum
      4. `confidence=0.2 → riskPerTrade scaled to 20%` — Phase 16 4% cap effect (0.2 × 0.01 = 0.002)
      5. `confidence` out-of-range clamped to [0, 1] — defensive: conf < 0 treated as 0, conf > 1 treated as 1

      For tests 1-4: mock a simple strategy that emits a single signal with the specified confidence,
      run a 10-candle backtest, verify the executed position notional matches expectation.

      ### 3. Quality gates (ALL MUST PASS)

      Run in sequence, stop on first failure:
      ```bash
      cd /Users/kiscsicska/projects/mm-crypto-bot
      bun run typecheck
      bun run lint
      bun test
      bun test --coverage --coverage-reporter=lcov
      ```

      Coverage requirement: **100% lines + branches on `engine.ts`**. Read `packages/backtest/coverage/lcov.info`
      directly and assert every line in `engine.ts` is covered.

      ### 4. Commit

      ```bash
      cd /Users/kiscsicska/projects/mm-crypto-bot/.worktrees/wt-phase17-a
      git add -A
      git commit -m "feat(phase17-a): wire signal.confidence → riskPerTrade in engine (cap fix #1)"
      git push -u origin feat/phase17-a-confidence-wiring
      ```

      ### 5. Open PR

      ```bash
      cd /Users/kiscsicska/projects/mm-crypto-bot/.worktrees/wt-phase17-a
      gh pr create \
        --title "feat(phase17-a): engine confidence → notional wiring (cap fix #1)" \
        --body "$(cat <<'EOF'
      ## Summary
      - Multiplies `opts.positionSize.riskPerTrade` by `signal.confidence` before calling `positionNotionalUsd`
      - Fixes Phase 16 finding: `applyCap()` scaled confidence to 0.20 but engine ignored it (no-op cap)
      - 5 new unit tests for confidence wiring edge cases
      - All existing tests pass (regression verified)
      EOF
      )"
      ```

      ### 6. Write deliverable.md

      At worktree root: `deliverable.md` listing:
      - What changed (engine.ts + engine.test.ts)
      - Test results (5 new tests + full suite)
      - Coverage result (must be 100% on engine.ts)
      - PR URL

      ## Memory rules (ABSOLUTE — do not violate)

      - **1:10 leverage MANDATORY** — `confidence × riskPerTrade` is pre-leverage risk scaling; 1:10 applied by engine separately
      - **No eslint-disable** — fix root cause
      - **No docstring lies** — if you add a JSDoc, it must match the code
      - **Coverage 100%** — read lcov.info directly, not test output summary
