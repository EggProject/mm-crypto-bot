    prompt: |
      You are the **Coder agent** working on **Phase 20 Track A** of mm-crypto-bot.

      ## Goal

      Build the **Per-Trade Hybrid-Kelly sizing drop-in module** per `.mavis/notes/phase20-scope-plan.md §3.1`.

      This is the first track of Phase 20 — see scope doc for full context. Phase 19 #1 (PRs #46/#47/#48 → main @ bc66ef2) closed with +32.24%/mo portfolio avg at 4.70% DD. Phase 20 #1 aims to push this to +40-45%/mo by replacing fixed-percentage-of-confidence with per-trade Hybrid-Kelly fraction.

      The existing `HybridKellyPlugin` (Phase 11.1e, on main via PR #20) emits a SizingSignal using **bucketed Sharpe → fixed multipliers** (1.0× / 0.7× / 0.5× / 0.25×). Phase 20 #1 is different: it computes a **per-trade** Kelly fraction from the signal's own historical win rate and payoff ratio, and OVERRIDES the `confidence` field on the SizingSignal at the signal-center emit choke point.

      ## Setup

      ```bash
      cd /Users/kiscsicska/projects/mm-crypto-bot
      git fetch origin
      git worktree add .worktrees/wt-phase20-a-hybrid-kelly-module -b feat/phase20-a-hybrid-kelly-module main
      cd .worktrees/wt-phase20-a-hybrid-kelly-module
      ```

      ## Files to produce

      ### 1. NEW: `packages/core/src/signal-center/sizing/per-trade-hybrid-kelly.ts` (~200 LOC)

      Public API:
      ```ts
      export interface HybridKellyConfig {
        readonly hybridKellyCap: number;          // default 0.5, Phase 14B ceiling 0.85
        readonly historyWindowDays: number;       // default 30 (per Phase 9 9E precedent)
        readonly minTradesForKelly: number;       // default 30 (per Phase 9 9E minTradeCount)
        readonly enabledSymbols?: readonly string[]; // default all 3 BTC/ETH/SOL
        readonly enabledSignatures?: readonly string[]; // default all SizingSignal.kind
      }

      export interface SignalTradeHistory {
        readonly signature: string;          // `${kind}:${side}:${symbol}` partition key
        readonly tradeList: readonly { pnlUsd: number; notionalUsd: number }[];
      }

      export function computeHybridKellyFraction(
        history: SignalTradeHistory,
        config: Pick<HybridKellyConfig, 'hybridKellyCap' | 'minTradesForKelly'>,
      ): number; // returns 0..1, never NaN

      export function applyHybridKelly(
        sizing: SizingSignal,
        historyLookup: (signature: string) => SignalTradeHistory,
        config: HybridKellyConfig,
        now: number,
      ): SizingSignal; // returns sizing with overridden confidence (or original if not enough history)
      ```

      **Math (per REPORT-phase19.md §7 quoted formula):**
      ```
      wins = history.tradeList.filter(t => t.pnlUsd > 0)
      losses = history.tradeList.filter(t => t.pnlUsd < 0)
      winRate = wins.length / history.tradeList.length
      avgWin = mean(wins.map(t => t.pnlUsd)) || 0
      avgLoss = abs(mean(losses.map(t => t.pnlUsd))) || 0
      payoffRatio = avgLoss > 0 ? avgWin / avgLoss : 1.0
      rawKelly = (winRate * payoffRatio - (1 - winRate)) / max(payoffRatio, 1e-9)
      return clamp(rawKelly, 0, config.hybridKellyCap)
      ```

      **Constructor validation:**
      - `new HybridKellyConfig(...)` throws if `hybridKellyCap > 1.0` (Phase 11.1e `HybridKellyPlugin` precedent — `kellyCap: 1.5` throws)
      - `hybridKellyCap < 0` throws
      - `historyWindowDays < 1` throws
      - `minTradesForKelly < 1` throws

      **`applyHybridKelly` returns original SizingSignal (not modified) when:**
      - signature not in `historyLookup`
      - history.tradeList.length < `minTradesForKelly`
      - symbol not in `enabledSymbols` (if specified)
      - sizing.kind not in `enabledSignatures` (if specified)
      - **Input/output are different references (defensive copy or frozen mutation)**

      **Immutability:** The function MUST NOT mutate the input SizingSignal. Use spread or `Object.freeze` to ensure the input is unchanged.

      **NaN guards:**
      - Empty array → returns 0
      - All-NaN pnl → returns 0
      - Any NaN in pnl → return 0
      - This is defensive; the test suite explicitly probes these.

      ### 2. NEW: `packages/core/src/signal-center/sizing/per-trade-hybrid-kelly.test.ts` (~250 LOC, ≥20 tests)

      **Test list (each `it()` or `test()` block MUST be present):**
      1. winRate=1.0, payoffRatio=any → kelly=1.0 (capped at hybridKellyCap)
      2. winRate=0.6, payoffRatio=2 → rawKelly=0.4 → clamped to 0.4 (within 0.5 default cap)
      3. winRate=0.5, payoffRatio=1 → kelly=0 (edge of profitable)
      4. winRate=0.4, payoffRatio=1 → kelly=-0.2 → clamp at 0 (loss-don't-bet)
      5. winRate=0.0 → kelly=0 (clamp at 0; no betting)
      6. winRate=0.6, history.length=29 (under minTradesForKelly=30) → kelly=0 (insufficient history)
      7. history.length === 0 → kelly=0 (no override)
      8. payoffRatio=∞ (no losses, all wins) → kelly=1.0 (clamped at cap)
      9. payoffRatio=0 (no wins, all losses) → kelly=0
      10. hybridKellyCap=1.5 → constructor throws (per Phase 11.1e precedent)
      11. hybridKellyCap=0.85 → constructor succeeds, clamps above 0.85 (Phase 14B ceiling precedent)
      12. hybridKellyCap=0.5 (default) → constructor succeeds
      13. SizingSignal immutability: input !== output (defensive copy verified)
      14. SizingSignal override case 1: input confidence=0.8, kelly=0.4 → output confidence=0.4
      15. SizingSignal override case 2: input confidence=0.8, kelly=0 → output confidence=0
      16. enabledSymbols filter: BTC-only config, ETH sizing pass-through (untouched)
      17. enabledSignatures filter: DIRECTIONAL-only, other kinds pass-through (untouched)
      18. NaN pnl in history → returns 0 (defensive guard)
      19. All-NaN pnl history → returns 0
      20. Empty array history → returns 0
      21. signature not in historyLookup → returns original SizingSignal (untouched)
      22. 1:10 leverage audit: assert `kelly × riskPerTrade × equity × leverage ≤ maxPositionPctEquity × equity × leverage` (Phase 6 1:10 mandate)

      ### 3. MODIFIED: `packages/core/src/index.ts`

      Add the new exports (HybridKellyConfig, SignalTradeHistory, computeHybridKellyFraction, applyHybridKelly) to the existing exports. Do NOT re-export `SizingSignal` (already exported). Use ESM-style re-export: `export type { HybridKellyConfig, SignalTradeHistory } from './signal-center/sizing/per-trade-hybrid-kelly.js';` and `export { computeHybridKellyFraction, applyHybridKelly } from './signal-center/sizing/per-trade-hybrid-kelly.js';`

