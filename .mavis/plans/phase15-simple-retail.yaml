        readonly donchianPeriod: number;     // default 20 (informational, actual period computed by engine)
        readonly adxTrendThreshold: number;  // default 25 — skip if ADX above
      }
      export const DEFAULT_DONCHIAN_RANGE_CONFIG: DonchianRangeChannelConfig;
      export class DonchianRangeChannelStrategy implements Strategy {
