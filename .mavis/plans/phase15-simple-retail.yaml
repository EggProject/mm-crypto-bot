      ## Deliverables (MUST PRODUCE ALL)

      ### 1. Pivot Point Grid — `packages/core/src/strategy/pivot-point-grid.ts` (~250 LOC)

      **Timeframe:** M15 (LTF), uses HTF (1d) for pivot point calculation.

      **Logic:**
      - On each LTF (M15) candle, the strategy needs the PREVIOUS HTF (1d) candle's H, L, C.
      - The engine's `IndicatorState` does NOT expose htf candle OHLC fields directly. Two viable approaches:
        - Approach A: ring-buffer of LTF closes; at each candle, detect HTF rollup boundary (`candle.timestamp % HTF_MS === 0`); at boundary, snapshot the previous HTF candle's H/L/C from accumulated LTF history.
        - Approach B: use `candle.high`, `candle.low`, `candle.close` for the current LTF candle. But this is wrong for pivot calc (we need previous DAY's range, not current 15m candle).
      - Use Approach A. State: `prevHtfHigh`, `prevHtfLow`, `prevHtfClose` (private fields). On each candle, accumulate current HTF (1d) running H/L/C. At HTF rollup boundary (`timestamp % 86400000 === 0`), commit previous HTF values + start fresh accumulation.
      - Compute pivot points from the committed previous HTF candle (H, L, C):
        - `PP = (H + L + C) / 3`
        - `R1 = PP + 0.382 × (H - L)`, `S1 = PP - 0.382 × (H - L)`
        - `R2 = PP + 0.618 × (H - L)`, `S2 = PP - 0.618 × (H - L)`
        - `R3 = PP + 1.000 × (H - L)`, `S3 = PP - 1.000 × (H - L)`
      - **Entry signals** (long):
        - If LTF close ≤ S2 → `side: 'buy'`, `stopLoss: S3`, `takeProfit: PP`, `confidence: 1.0`
        - If LTF close ≤ S1 (and not ≤ S2) → `side: 'buy'`, `stopLoss: S2`, `takeProfit: PP`, `confidence: 0.7`
      - **Entry signals** (short):
        - If LTF close ≥ R2 → `side: 'sell'`, `stopLoss: R3`, `takeProfit: PP`, `confidence: 1.0`
        - If LTF close ≥ R1 (and not ≥ R2) → `side: 'sell'`, `stopLoss: R2`, `takeProfit: PP`, `confidence: 0.7`
      - In the middle zone (S1 < close < R1) → no signal.
      - Warmup: 100 M15 candles (≈25h, enough for 1d HTF accumulation buffer + previous-day capture).
      - If previous HTF candle missing (no committed values) → return null.

      **Class signature:**
      ```typescript
      export interface PivotPointGridConfig {
        readonly multiplierFib1: number;   // default 0.382
        readonly multiplierFib2: number;   // default 0.618
        readonly multiplierFib3: number;   // default 1.000
      }
      export const DEFAULT_PIVOT_GRID_CONFIG: PivotPointGridConfig;
      export class PivotPointGridStrategy implements Strategy {
        readonly name = 'Pivot Point Grid (Phase 15 M15 range-mean-reversion)';
        readonly timeframes = ['1d', '15m'] as const;
        readonly config: PivotPointGridConfig;
        // HTF accumulator (rolling 1d candle from LTF history)
        private currHtfHigh: number | undefined;
        private currHtfLow: number | undefined;
        private currHtfClose: number | undefined;
        // Committed previous HTF values
        private prevHtfHigh: number | undefined;
        private prevHtfLow: number | undefined;
        private prevHtfClose: number | undefined;
        constructor(config?: Partial<PivotPointGridConfig>);
        warmup(): number;
        onCandle(ctx: StrategyContext): StrategySignal | null;
      }
      ```

      Tests in `pivot-point-grid.test.ts` (≥10 tests):
      - Default config multipliers (0.382/0.618/1.0)
      - Warmup returns 100
      - LTF close at S2 → long, SL=S3, TP=PP, confidence=1.0
      - LTF close at S1 → long, SL=S2, TP=PP, confidence=0.7
      - LTF close at R2 → short, SL=R3, TP=PP, confidence=1.0
      - LTF close at R1 → short, SL=R2, TP=PP, confidence=0.7
      - Middle zone (PP±small) → no signal
      - Missing prev HTF data → no signal
      - Custom multipliers respected (e.g., 0.5/1.0/1.5)
      - Pivot recomputed when prev HTF candle changes (boundary detection works)
      - Boundary timestamp detection: candle at timestamp % 86400000 == 0 triggers commit

      ### 2. Bollinger Range Squeeze — `packages/core/src/strategy/bollinger-range-squeeze.ts` (~250 LOC)

      **Timeframe:** M5 (LTF), uses MTF (1h) for BB(20, 2σ).

      **Logic:**
      - On each M5 candle, read the last closed MTF (1h) candle's BB values from `mtfState.mtf.bbUpper`, `mtfState.mtf.bbLower`, `mtfState.mtf.bbMiddle`.
      - Compute bbWidth = `(bbUpper - bbLower) / bbMiddle`.
      - **Squeeze detection:** bbWidth < squeezeThreshold (default 0.020 = 2%). Track consecutive squeeze candles in internal state.
      - Require ≥2 consecutive squeeze candles (configurable, default 2) before breakout counts (filter false breakouts).
      - **Breakout (long):** When in squeeze state, the next candle where close > bbUpper → emit `side: 'buy'`, `stopLoss: bbMiddle`, `takeProfit: bbUpper + 2 × atr`, `confidence: 1.0`. Exit squeeze state.
      - **Breakout (short):** When in squeeze state, next candle where close < bbLower → emit `side: 'sell'`, `stopLoss: bbMiddle`, `takeProfit: bbLower - 2 × atr`, `confidence: 1.0`. Exit squeeze state.
      - When not in squeeze (bbWidth ≥ threshold), reset consecutive squeeze counter to 0.
      - If ATR missing → no signal.
      - Warmup: 30 M5 candles (≈2.5h).

      **Class signature:**
      ```typescript
      export interface BollingerSqueezeConfig {
        readonly squeezeThreshold: number;       // default 0.020
        readonly minConsecutiveSqueezeCandles: number;  // default 2
        readonly atrBreakoutMultiplier: number;  // default 2.0
      }
      export const DEFAULT_BB_SQUEEZE_CONFIG: BollingerSqueezeConfig;
      export class BollingerRangeSqueezeStrategy implements Strategy {
        readonly name = 'Bollinger Range Squeeze (Phase 15 M5 breakout)';
        readonly timeframes = ['1h', '5m'] as const;
        readonly config: BollingerSqueezeConfig;
        private consecutiveSqueezeCount: number;
        constructor(config?: Partial<BollingerSqueezeConfig>);
        warmup(): number;
        onCandle(ctx: StrategyContext): StrategySignal | null;
      }
      ```

      Tests in `bollinger-range-squeeze.test.ts` (≥12 tests):
      - Default config (0.020 / 2 / 2.0)
      - Warmup returns 30
      - bbWidth < threshold → no signal yet (need 2 consecutive)
      - 2 consecutive squeeze + close > bbUpper → long, SL=bbMiddle, TP=bbUpper + 2*ATR
      - 2 consecutive squeeze + close < bbLower → short, SL=bbMiddle, TP=bbLower - 2*ATR
      - Single squeeze candle (then exits) → no breakout signal
      - Squeeze exits → reset consecutive count
      - Custom squeezeThreshold respected
      - Custom minConsecutiveSqueezeCandles respected
      - Custom atrBreakoutMultiplier respected
      - Missing BB data → no signal
      - Missing ATR data → no signal

