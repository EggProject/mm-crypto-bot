      ### 2. Keltner Volatility-Adaptive Grid — `packages/core/src/strategy/keltner-grid.ts` (~300 LOC)

      **Timeframe:** M5 (LTF), uses MTF (1h) for ATR.

      **Logic:**
      - Keltner channel: `upper = ema20 + kMultiplier × atr`, `lower = ema20 - kMultiplier × atr` (default kMultiplier=1.5).
      - EMA20 is NOT in `IndicatorState` (only ema50/200). Compute EMA20 inline in the strategy using a ring buffer of last 20 LTF closes (M5).
      - The Keltner bands are recomputed on every M5 candle from the EMA20 + latest ATR.
      - Grid levels: 5 levels inside the Keltner band at 20%/40%/60%/80% (between lower and upper, evenly spaced).
      - **Regime filter:**
        - Long bias: close > ema20 → only long signals allowed (from lower-band grid levels)
        - Short bias: close < ema20 → only short signals allowed (from upper-band grid levels)
        - At ema20: no signal (transition zone)
      - **Long signal:** when regime = long, and close touches one of the lower 3 grid levels (20%/40%/60% from lower) → `side: 'buy'`, `stopLoss: lower - 0.5 × atr`, `takeProfit: ema20` (target the middle), `confidence: 0.7`.
      - **Short signal:** when regime = short, and close touches one of the upper 3 grid levels (40%/60%/80% from lower, i.e., 20%/40%/60% from upper) → `side: 'sell'`, `stopLoss: upper + 0.5 × atr`, `takeProfit: ema20`, `confidence: 0.7`.
      - Warmup: 30 M5 candles (for EMA20 ring buffer to fill + ATR to compute).

      **Class signature:**
      ```typescript
      export interface KeltnerGridConfig {
        readonly kMultiplier: number;        // default 1.5
        readonly gridLevelCount: number;     // default 5
        readonly atrPeriod: number;          // default 14 (matches engine)
      }
      export const DEFAULT_KELTNER_GRID_CONFIG: KeltnerGridConfig;
      export class KeltnerGridStrategy implements Strategy {
        readonly name = 'Keltner Volatility-Adaptive Grid (Phase 15 M5 grid)';
        readonly timeframes = ['1h', '5m'] as const;
        readonly config: KeltnerGridConfig;
        private closeRingBuffer: number[];    // last 20 LTF closes for EMA20
        constructor(config?: Partial<KeltnerGridConfig>);
        warmup(): number;
        onCandle(ctx: StrategyContext): StrategySignal | null;
      }
      ```

      Tests in `keltner-grid.test.ts` (≥12 tests):
      - Default config (kMultiplier=1.5, gridLevelCount=5, atrPeriod=14)
      - Warmup returns 30
      - EMA20 ring buffer fills correctly (closes 1-20 → EMA20 computed at warmup completion)
      - Keltner band math: upper = EMA20 + 1.5 × ATR, lower = EMA20 - 1.5 × ATR
      - Long regime (close > EMA20), close touches lower-20% grid → long signal
      - Long regime, close touches upper-20% grid → no signal (long bias doesn't fire upper)
      - Short regime (close < EMA20), close touches upper-20% grid → short signal
      - At EMA20 → no signal
      - Missing ATR → no signal
      - Custom kMultiplier respected (e.g., 2.0 produces wider bands)
      - Custom gridLevelCount respected (e.g., 3 produces 3 levels)
      - Mid-grid level (50%) is not in trigger zones (only 20/40/60% fire)

      ### 3. EMA20 inline computation helper

      For the Keltner strategy's `closeRingBuffer`, use a standard EMA formula:
      ```
      multiplier = 2 / (period + 1) = 2 / 21 ≈ 0.0952
      ema = (close - prev_ema) × multiplier + prev_ema
      ```
      First EMA = SMA of first 20 closes (seed value).

