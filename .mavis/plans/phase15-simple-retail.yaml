      ### 3. Simple Retail Ensemble — `packages/core/src/strategy/simple-retail-ensemble.ts` (~300 LOC + tests)

      Class `SimpleRetailEnsemble` — composes Pivot Grid + BB Squeeze + Donchian Range + Keltner Grid.

      **Logic:**
      - On each LTF candle, run all 4 sub-strategies.
      - If 0 non-null signals → return null (no signal).
      - If all signals agree on direction (e.g., all "buy") → return the highest-confidence signal (with reason tagged `[Ensemble] consensus=N/4`).
      - If signals conflict (e.g., long + short both fire) → return null (defer; the strategy doesn't take contradictory positions).
      - Single signal (only 1 fires) → return that signal with reason tagged `[Ensemble] solo=<strategy-name>`.

      **Class signature:**
      ```typescript
      export interface SimpleRetailEnsembleConfig {
        readonly pivotGrid: Partial<PivotPointGridConfig>;
        readonly bbSqueeze: Partial<BollingerSqueezeConfig>;
        readonly donchianRange: Partial<DonchianRangeChannelConfig>;
        readonly keltnerGrid: Partial<KeltnerGridConfig>;
      }
      export const DEFAULT_SIMPLE_RETAIL_ENSEMBLE_CONFIG: SimpleRetailEnsembleConfig;
      export class SimpleRetailEnsemble implements Strategy {
        readonly name = 'Simple Retail Ensemble (Phase 15 — Pivot + BB Squeeze + Donchian Range + Keltner Grid)';
        readonly timeframes: readonly Timeframe[];  // depends on LTF choice
        readonly pivotGrid: PivotPointGridStrategy;
        readonly bbSqueeze: BollingerRangeSqueezeStrategy;
        readonly donchianRange: DonchianRangeChannelStrategy;
        readonly keltnerGrid: KeltnerGridStrategy;
        constructor(config?: Partial<SimpleRetailEnsembleConfig>, ltf?: Timeframe);
        warmup(): number;
        onCandle(ctx: StrategyContext): StrategySignal | null;
      }
      ```

      Note: `ltf` parameter selects which timeframe the ensemble runs at. Defaults to M15 (since 2 of 4 strategies are M15). When LTF=M15, BB Squeeze + Keltner Grid (both M5) get aggregated candles from M15 (acceptable for ensemble-level backtest).

      Tests in `simple-retail-ensemble.test.ts` (≥10 tests):
      - Default construction
      - All 4 strategies exist and are configured
      - Warmup = max of 4 sub-strategies
      - All null signals → null
      - Single signal (only pivot fires) → that signal, reason tagged "solo=pivot-grid"
      - Multiple same-direction signals (pivot + donchian both long) → highest-confidence wins, reason tagged "consensus=N/4"
      - Conflicting signals (pivot long + donchian short) → null (defer)
      - Custom config respected
      - Custom LTF (5m instead of 15m) reflected in timeframes field
      - Each sub-strategy receives the same `ctx` (delegation test)

      Coverage 100% on `simple-retail-ensemble.ts` (lcov.info direct read).

