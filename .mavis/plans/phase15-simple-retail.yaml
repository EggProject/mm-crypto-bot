      - Read `mtfState.htf.adx` for trend filter.
      - Read `mtfState.ltf.atr` (or `mtfState.mtf.atr`) for stop-loss distance.
      - **Trend filter:** if `adx > 25` → return null (range strategy doesn't apply in trending market).
      - **Entry long:** LTF close ≤ donchianLower → `side: 'buy'`, `stopLoss: donchianLower - atr`, `takeProfit: donchianUpper`, `confidence: 1.0`.
      - **Entry short:** LTF close ≥ donchianUpper → `side: 'sell'`, `stopLoss: donchianUpper + atr`, `takeProfit: donchianLower`, `confidence: 1.0`.
      - In the middle zone (donchianLower < close < donchianUpper) → no signal.
      - If ATR missing → no signal (can't compute stop distance).
      - Warmup: 30 M15 candles (≈7.5h).

      **Class signature:**
