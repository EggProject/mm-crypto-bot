      You are the **Coder agent** working on **Phase 24 Track A** of mm-crypto-bot.

      ## Context

      **Project state (2026-07-07 22:50 Budapest):** 4-NEGATIVE-streak across Phases 20-21-22-23 archived in `docs/research/PHASE-20-21-22-23-ARCHIVE.md`. Any per-bar feature-classifier modifier loses geometric compounding without filtering winners.

