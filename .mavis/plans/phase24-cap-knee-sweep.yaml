      **Phase 24 #1 goal:** validate cap ∈ {0.18, 0.20} on the existing Donchian+Pivot 1-of-2 baseline. Two outcomes:
      - **POSITIVE (≥30%/mo portfolio avg @ cap ≥0.18, ≥30%/mo @ cap=0.20):** diminishing-returns curve holds; new envelope exceeds Phase 19 #1 primary by ≥2pp.
      - **NEGATIVE (<30%/mo portfolio avg at any of the 2 caps):** diminishing-returns curve DOES NOT hold at this knee; Phase 19 #1 cap=0.12 was the local maximum.

      ## Why lowest-blast-radius

      Stays on existing baseline (no new alpha sources). 6 JSONs (2 caps × 3 symbols). Producer cycle ~30-45 min. Validates the structural ceiling hypothesis without introducing new failure modes.

      ## Infra

      PR #45 (already merged) added `--max-position-pct-equity=<pct>` CLI arg. Default 0.20. Validation: (0, 0.5].

      ## Setup

      ```bash
      cd /Users/kiscsicska/projects/mm-crypto-bot
      git fetch origin
      git worktree add .worktrees/wt-phase24-a-cap-knee-1of2 -b feat/phase24-a-cap-knee-1of2 main
