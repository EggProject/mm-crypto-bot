      You are the **Coder agent** working on **Phase 16 Track A** of the mm-crypto-bot project.

      ## Context

      Phase 15 Pivot Point Grid backtests reported +60-90%/mo with 5-8% MaxDD, but at the configured
      `maxPositionPctEquity=0.2` the strategy compounds winners across successive S/R levels and can
      breach realistic capital caps. Phase 16 Track A adds a strategy-side `maxPositionPctEquity` cap
      (default 0.04) that scales `confidence` so the engine-side position-sizing cap is enforced.

      Read these files FIRST, in order:
      1. `/Users/kiscsicska/projects/mm-crypto-bot/.mavis/notes/phase16-scope-plan.md` — authoritative scope plan
      2. `/Users/kiscsicska/projects/mm-crypto-bot/packages/core/src/strategy/pivot-point-grid.ts` — current implementation (from PR #34)
      3. `/Users/kiscsicska/projects/mm-crypto-bot/packages/core/src/strategy/pivot-point-grid.test.ts` — current tests
      4. `/Users/kiscsicska/projects/mm-crypto-bot/packages/core/src/types.ts` — `Strategy`, `StrategyContext`, `StrategySignal` interfaces
      5. Memory: `/Users/kiscsicska/.mavis/agents/mavis/memory/mm-crypto-bot-project.md` — 1:10 mandate, bybit.eu SPOT-only

      ## Setup

      - Worktree: `/Users/kiscsicska/projects/mm-crypto-bot/.worktrees/wt-phase16-a`
      - Create: `cd /Users/kiscsicska/projects/mm-crypto-bot && git worktree add .worktrees/wt-phase16-a -b feat/phase16-a-notional-cap main`
      - Base branch: `main` (already has Pivot Grid from PR #34 merged)
      - The branch is yours alone

      ## Deliverables (MUST PRODUCE ALL)

      ### 1. Modify `packages/core/src/strategy/pivot-point-grid.ts` (~+50 LOC)

      Add a `maxPositionPctEquity` field to `PivotPointGridConfig`:

      ```typescript
      export interface PivotPointGridConfig {
        readonly multiplierFib1: number;       // default 0.382
        readonly multiplierFib2: number;       // default 0.618
        readonly multiplierFib3: number;       // default 1.000
        readonly maxPositionPctEquity: number; // default 0.04 — Phase 16 productionization cap
      }
      ```

      In `onCandle`, BEFORE returning any signal (long at S1/S2, short at R1/R2), scale `confidence`:

      ```typescript
      // After computing the signal with confidence 0.7 or 1.0:
      // Scale confidence so engine-side maxPositionPctEquity constraint is enforced.
      // The engine's maxPositionPctEquity already enforces the hard cap; this scales
      // the strategy-side confidence so the engine emits a SMALLER (not larger) position.
      const capScale = Math.min(1.0, signal.confidence);  // never amplify beyond original
      const scaled = { ...signal, confidence: capScale };
      return scaled;
      ```

      Wait — re-read the Phase 16 scope doc carefully. The cap means: the strategy should NOT emit signals that would request more than `maxPositionPctEquity` of equity. With Pivot Grid at `maxPositionPctEquity=0.04` and engine-side `maxPositionPctEquity=0.04`, the engine already enforces it via position sizing. The strategy-side change is:

      - **Add `maxPositionPctEquity` to config** (default 0.04)
      - **At signal emit time**: scale `confidence` down to `capScale = min(1.0, maxPositionPctEquity / engineMaxPositionPctEquity)`. If `maxPositionPctEquity < engineMaxPositionPctEquity`, signal confidence is clamped down proportionally. This means at default cap 0.04 and engine cap 0.2, confidence = 0.7 × (0.04 / 0.2) = 0.14 (very small). At custom cap 1.0, confidence is unchanged (legacy).

      Implementation:
      ```typescript
      // At signal emit:
      const engineMaxPosPct = 0.2;  // default engine-side cap, configurable via context (future)
      const capScale = Math.min(1.0, this.config.maxPositionPctEquity / engineMaxPosPct);
      const scaledConfidence = signal.confidence * capScale;
      return { ...signal, confidence: scaledConfidence };
      ```

      Also expose a new constant `DEFAULT_PIVOT_GRID_CONFIG.maxPositionPctEquity = 0.04`.

      ### 2. Tests in `pivot-point-grid.test.ts` (add 4 NEW tests, keep existing ≥10)

      - **Cap respected (default 0.04)**: signal with original confidence 0.7 produces scaled confidence 0.7 × (0.04 / 0.2) = 0.14
      - **Cap respected (default 0.04, full-confidence signal)**: original confidence 1.0 produces scaled confidence 0.2
      - **Custom cap respected (e.g., 0.02)**: signal confidence scaled to 0.7 × (0.02 / 0.2) = 0.07
      - **Cap = 1.0 (legacy)**: signal confidence unchanged (1.0 stays 1.0, 0.7 stays 0.7)
      - **Cap = 0.04 but engine max is 0.04**: scale = 1.0, no clamping (engine cap matches)

      ### 3. Coverage 100% on modified file (lcov.info direct read)

      ```bash
      cd packages/core && bun test src/strategy/pivot-point-grid.test.ts --coverage --coverage-reporter=lcov --coverage-dir=coverage
      ```
      Read `packages/core/coverage/lcov.info` directly. Verify `pivot-point-grid.ts` has `lh === lf` AND `brh === brf`.

      ### 4. deliverable.md (REQUIRED at worktree root)

      `/Users/kiscsicska/projects/mm-crypto-bot/.worktrees/wt-phase16-a/deliverable.md`:
      - Files modified (`pivot-point-grid.ts` + `pivot-point-grid.test.ts`)
      - LOC delta per file
      - New test count (4 added, total ≥14)
      - Coverage % from lcov.info direct read
      - Any deviations from this prompt with rationale

      ## Acceptance criteria

      - typecheck PASS (`bun run typecheck`)
      - lint PASS (0 errors)
      - test PASS (`bun test src/strategy/pivot-point-grid.test.ts`)
      - coverage 100% lines + branches on `pivot-point-grid.ts` (lcov.info direct read)
      - deliverable.md present
      - DEFAULT_PIVOT_GRID_CONFIG.maxPositionPctEquity = 0.04

      ## Workflow

      1. Create worktree, branch
      2. Read current `pivot-point-grid.ts` to understand existing emit pattern
      3. Add `maxPositionPctEquity` to config + DEFAULT_PIVOT_GRID_CONFIG
      4. Add confidence scaling at signal emit
      5. Add 4 new tests
      6. Run typecheck + lint + test + coverage
      7. Commit, push, write deliverable.md
      8. Report back to parent via `mavis communication send`

      ## Memory rules active

      - **1:10 leverage MANDATORY** — strategies only emit signals; sizing is engine-side. The notional cap is strategy-side signal confidence scaling; engine-side `positionSize.maxPositionPctEquity` still enforces the hard cap.
      - **bybit.eu SPOT-only** — no change to cost model
      - **No docstring lies** — every JSDoc claim must be backed by actual code
      - **No eslint-disable** — fix root cause
      - **Coverage 100% on MODIFIED file** — read lcov.info directly
