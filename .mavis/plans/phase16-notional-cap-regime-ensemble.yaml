      3. **Implements Strategy interface**: grep `implements Strategy`; verify `onCandle(ctx: StrategyContext): StrategySignal | null` and `warmup(): number`.
      4. **4 sub-strategy fields**: class has 4 private fields: `pivotGrid`, `bbSqueeze`, `donchianRange`, `keltnerGrid`.
