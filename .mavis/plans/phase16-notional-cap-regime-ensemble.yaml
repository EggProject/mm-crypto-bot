  - id: 'phase16-track-b-regime-ensemble'
    title: 'Phase 16 Track B — Regime-Routed Ensemble (ADX-routed Pivot/Donchian + BB/Keltner)'
    prompt: |
      You are the **Coder agent** working on **Phase 16 Track B** of the mm-crypto-bot project.

      ## Context

      Phase 15 Simple Retail Ensemble produced only +4.73%/mo BTC (vs +13-90% individual strategies)
      because consensus-at-mixed-timeframe composition dilutes signal quality. Phase 16 Track B replaces
      this with a regime-routed ensemble: ADX < 20 fires mean-reversion strategies (Pivot Grid + Donchian
      Range), ADX ≥ 20 fires breakout strategies (BB Squeeze + Keltner Grid).

      Read these files FIRST, in order:
      1. `/Users/kiscsicska/projects/mm-crypto-bot/.mavis/notes/phase16-scope-plan.md`
      2. `/Users/kiscsicska/projects/mm-crypto-bot/packages/core/src/strategy/pivot-point-grid.ts` — sub-strategy 1
      3. `/Users/kiscsicska/projects/mm-crypto-bot/packages/core/src/strategy/bollinger-range-squeeze.ts` — sub-strategy 2
      4. `/Users/kiscsicska/projects/mm-crypto-bot/packages/core/src/strategy/donchian-range-channel.ts` — sub-strategy 3
      5. `/Users/kiscsicska/projects/mm-crypto-bot/packages/core/src/strategy/keltner-grid.ts` — sub-strategy 4
      6. `/Users/kiscsicska/projects/mm-crypto-bot/packages/core/src/strategy/simple-retail-ensemble.ts` — reference composition pattern
      7. `/Users/kiscsicska/projects/mm-crypto-bot/packages/core/src/types.ts` — interfaces
