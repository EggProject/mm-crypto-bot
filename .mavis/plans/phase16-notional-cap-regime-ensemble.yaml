      - test PASS (`bun test src/strategy/regime-routed-ensemble.test.ts`)
      - coverage 100% lines + branches on `regime-routed-ensemble.ts` (lcov.info direct read)
      - deliverable.md present
      - DEFAULT_REGIME_ROUTED_ENSEMBLE_CONFIG.adxRangeThreshold = 20

      ## Workflow

      1. Create worktree, branch
      2. Read sub-strategy signatures to understand config + emit patterns
      3. Implement RegimeRoutedEnsemble
      4. Write tests with sub-strategy mocks/spies to verify filtering
      5. Run typecheck + lint + test + coverage
      6. Commit, push, write deliverable.md
      7. Report back to parent via `mavis communication send`

      ## Memory rules active

      - **1:10 leverage MANDATORY** — strategies only emit signals; sizing is engine-side
      - **No docstring lies** — every JSDoc claim must be backed by actual code
      - **No eslint-disable** — fix root cause
      - **Coverage 100% on NEW files** — read lcov.info directly
