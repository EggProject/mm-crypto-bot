      ## Setup

      - Worktree: `/Users/kiscsicska/projects/mm-crypto-bot/.worktrees/wt-phase16-b`
      - Create: `cd /Users/kiscsicska/projects/mm-crypto-bot && git worktree add .worktrees/wt-phase16-b -b feat/phase16-b-regime-ensemble main`
      - Base branch: `main` (already has all 4 sub-strategies + simple-retail-ensemble)
      - The branch is yours alone

      ## Deliverables (MUST PRODUCE ALL)

      ### 1. Regime-Routed Ensemble — `packages/core/src/strategy/regime-routed-ensemble.ts` (~300 LOC)

      **Logic:**
      - On each LTF (M15 default) candle, run all 4 sub-strategies.
      - Read `mtfState.htf.adx` to determine regime:
        - `adx < config.adxRangeThreshold` → **range regime** → Pivot Grid + Donchian Range eligible
        - `adx >= config.adxRangeThreshold` → **trend regime** → BB Squeeze + Keltner Grid eligible
      - If ADX missing → return null (cannot determine regime)
      - From the eligible signals:
        - 0 signals → return null
        - All signals agree on direction (e.g., both Pivot + Donchian long) → return the highest-confidence signal with reason tagged `[RegimeEnsemble] regime=range consensus=N/2`
        - Conflicting directions (e.g., Pivot long + Donchian short) → return null (defer)
        - Single signal → return that signal with reason tagged `[RegimeEnsemble] regime=X solo=strategy-name`

      **Class signature:**
      ```typescript
      export interface RegimeRoutedEnsembleConfig {
        readonly adxRangeThreshold: number;       // default 20
        readonly pivotGrid: Partial<PivotPointGridConfig>;
        readonly bbSqueeze: Partial<BollingerSqueezeConfig>;
        readonly donchianRange: Partial<DonchianRangeChannelConfig>;
        readonly keltnerGrid: Partial<KeltnerGridConfig>;
      }
      export const DEFAULT_REGIME_ROUTED_ENSEMBLE_CONFIG: RegimeRoutedEnsembleConfig;
      export class RegimeRoutedEnsemble implements Strategy {
        readonly name = 'Regime-Routed Ensemble (Phase 16 — ADX-routed Pivot/Donchian + BB/Keltner)';
        readonly timeframes: readonly Timeframe[];  // depends on LTF choice
        readonly config: RegimeRoutedEnsembleConfig;
        private pivotGrid: PivotPointGridStrategy;
        private bbSqueeze: BollingerRangeSqueezeStrategy;
        private donchianRange: DonchianRangeChannelStrategy;
        private keltnerGrid: KeltnerGridStrategy;
        constructor(config?: Partial<RegimeRoutedEnsembleConfig>, ltf?: Timeframe);
        warmup(): number;
        onCandle(ctx: StrategyContext): StrategySignal | null;
      }
      ```

      Note: `ltf` parameter selects which timeframe the ensemble runs at. Defaults to M15 (since 2 of 4 strategies are M15). When LTF=M15, BB Squeeze + Keltner Grid (both M5) get aggregated candles from M15.

      Regime detection implementation:
      ```typescript
      const adx = ctx.mtfState?.htf?.adx;
      if (adx === undefined || adx === null) return null;  // no regime detection possible
      const isRangeRegime = adx < this.config.adxRangeThreshold;
      ```

      Sub-strategy filtering:
      ```typescript
      const signals: StrategySignal[] = [];
      if (isRangeRegime) {
        const pivotSignal = this.pivotGrid.onCandle(ctx);
        const donchianSignal = this.donchianRange.onCandle(ctx);
        if (pivotSignal) signals.push(pivotSignal);
        if (donchianSignal) signals.push(donchianSignal);
      } else {
        const bbSignal = this.bbSqueeze.onCandle(ctx);
        const keltnerSignal = this.keltnerGrid.onCandle(ctx);
        if (bbSignal) signals.push(bbSignal);
        if (keltnerSignal) signals.push(keltnerSignal);
      }
      ```

      Consensus logic:
      ```typescript
      if (signals.length === 0) return null;
      const sides = new Set(signals.map(s => s.side));
      if (sides.size > 1) return null;  // conflicting directions → defer
      const winner = signals.reduce((a, b) => a.confidence > b.confidence ? a : b);
      const regime = isRangeRegime ? 'range' : 'trend';
      const reasonTag = signals.length > 1
        ? `[RegimeEnsemble] regime=${regime} consensus=${signals.length}/2`
        : `[RegimeEnsemble] regime=${regime} solo=${winner.strategyName || 'unknown'}`;
      return { ...winner, reason: `${winner.reason ?? ''} ${reasonTag}`.trim() };
      ```

      ### 2. Tests in `regime-routed-ensemble.test.ts` (≥12 tests)

      - Default config (adxRangeThreshold=20)
      - Warmup = max of 4 sub-strategies (max(100, 30, 30, 30) = 100)
      - ADX < 20 → only Pivot + Donchian considered (verify BB + Keltner NOT called via mock spy or sub-strategy emit counter)
      - ADX >= 20 → only BB + Keltner considered (verify Pivot + Donchian NOT called)
      - ADX exactly 20 → trend regime (strict >= comparison)
      - Range regime + Pivot long + Donchian long → long signal, reason tagged "regime=range consensus=2/2"
      - Range regime + Pivot long + Donchian short → null (defer, conflict)
      - Range regime + only Pivot long → emit, reason tagged "regime=range solo=pivot-grid"
      - Trend regime + BB long + Keltner long → long signal
      - Trend regime + BB short + Keltner long → null (conflict)
      - Missing ADX → null (no regime detection)
      - Custom adxRangeThreshold respected (e.g., 25 → ADX 22 = range, ADX 27 = trend)
      - Sub-strategies receive same `ctx` (delegation test)

      Coverage 100% on `regime-routed-ensemble.ts` (lcov.info direct read).

      ### 3. deliverable.md (REQUIRED at worktree root)

