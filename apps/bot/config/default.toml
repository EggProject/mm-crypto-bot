# mm-crypto-bot — default configuration
# ======================================================================
#
# EGYETLEN config-file, ami a teljes botot vezérli. A séma
# Zod-validált (lásd `apps/bot/src/config/schema.ts`).
#
# Használat:
#   - Szerkeszd ezt a fájlt (vagy másold át pl. `config/prod.toml`)
#   - Indítsd a botot: `mm-bot start --config=path/to/your.toml`
#   - Ha nincs `--config`, a bot a beépített default-okkal indul
#     (ami MEGEGYEZIK ezzel a fájllal).
#
# A `per-strategy enable/disable` a `[strategies.X]` blokkokban lévő
# `enabled = true|false` flag-ekkel történik. A `false` érték
# kikapcsolja a stratégiát: a bot NEM fogja példányosítani, és a
# runtime loopban sem jelenik meg.
#
# A per-strategy `[strategies.X]` blokkokban a sémán túli mezők
# (cap, leverage, symbols, timeframes, ...) forward-compatibilisen
# átmennek (Zod `.passthrough()`), és a `strategy-registry.ts` factory-i
# alkalmazzák őket a konstruktor-híváskor.
#
# ======================================================================
# 1) BOT — indítási mód, log-szint, state-fájl
# ======================================================================
[bot]
mode = "paper"        # "paper" | "live"  (env: BUN_ENV is felülírja)
log_level = "info"    # "debug" | "info" | "warn" | "error"  (env: LOG_LEVEL)
state_file = "data/bot-state.json"   # perzisztens state JSON-fájl

# ----------------------------------------------------------------------
# INDÍTÁSI MÓD (Phase 34) — `mm-bot start` ALAPÉRTELMEZETT A TUI
# ----------------------------------------------------------------------
# A `mm-bot start` a Phase 34 óta ALAPÉRTELMEZETTEN az Ink TUI-t indítja
# (user mandate 2026-07-12 02:00 Budapest, eredeti spec §4.3).
#
# A mód kiválasztása FLAG-ekkel történik (NEM a config-ban):
#
#   mm-bot start                       # TUI (default) + bot
#   mm-bot start --headless            # plain text logok + bot (NEM TUI)
#                                     # Ebben a módban a `@mm-crypto-bot/tui`
#                                     # csomag NEM töltődik be, így a bundle
#                                     # ~30%-kal kisebb, és nincs React/Ink
#                                     # overhead a futás során.
#   mm-bot start --no-color            # TUI + bot, ANSI színkódok nélkül
#   mm-bot start --headless --no-color # clean text logok (CI / nohup)
#   mm-bot tui                         # CSAK TUI, NINCS bot (UI/UX demo)
#   mm-bot tui --data-source=paper     # TUI + paper engine, NINCS bot
#   mm-bot tui --seed=42               # TUI + reprodukálható szimuláció
#
# Színkezelés (Phase 34 Track C):
#   - Alapértelmezetten az ANSI színkódok BE vannak kapcsolva.
#   - `--no-color` CLI flag → letiltja (TTY-ellenőrzéstől függetlenül).
#   - `NO_COLOR=1` env var → letiltja (a no-color.org szabvány).
#   - Ha az stdout NEM TTY (pipe / redirect), a `picocolors` automatikusan
#     letiltja a színeket — a `--no-color` flag defense-in-depth.
#
# A `--headless` mód az alábbi esetekben KÖTELEZŐ:
#   - CI / GitHub Actions (nincs interaktív terminál).
#   - `nohup` / `systemd` / Docker detach (nincs TTY allokálva).
#   - Log aggregáció: `mm-bot start --headless | tee bot.log` (a TTY
#     auto-detect kikapcsolja a színeket, de a `--no-color` explicit).
# ----------------------------------------------------------------------

# ======================================================================
# 2) EXCHANGE — melyik exchange-re csatlakozunk
# ======================================================================
[exchange]
id = "bybiteu"        # "bybiteu" | "mock"  (Phase 25 #2: bybit.eu SPOT margin)
rate_limit_ms = 100   # CCXT rate-limit (ms/kérés); bybit.eu default 100
sandbox = false       # bybit.eu SPOT — nincs valódi sandbox; mindig false

# ======================================================================
# 3) RISK — projekt-szintű kockázati limitek
# ======================================================================
[risk]
risk_per_trade = 0.01     # 1% of equity per trade (Phase 14B target)
kelly_fraction = 0.25     # 1/4-Kelly (konzervatív quarter-Kelly)
max_drawdown_pct = 0.15   # 15% DD kill-switch (user mandate, Phase 14B)
max_positions = 3         # 1 per symbol (BTC/ETH/SOL)
max_leverage = 10         # 1:10 MANDATE (bybit.eu ceiling) — Zod enforces max 10

# ======================================================================
# 4) SYMBOLS — mely coin-okon kereskedünk
# ======================================================================
[symbols]
enabled = ["BTC/USDC", "ETH/USDC", "SOL/USDC"]   # CCXT unified formátumban

# ======================================================================
# 5) STRATEGIES — per-strategy enable/disable + per-strategy overrides
# ======================================================================
# Minden stratégia section-jében:
#   - `enabled = true`  → a bot példányosítja és beregisztrálja
#   - `enabled = false` → a bot NEM példányosítja (wire-up OFF)
#
# A séma forward-compatibilis: bármilyen új per-strategy mezőt
# bevezethetünk anélkül, hogy a meglévő config-ok eltörnének.

# --- 5.1) Donchian + Pivot 2-component composition (Phase 18 baseline) ---
[strategies.donchian_pivot_composition]
enabled = true
cap = 0.20                # max position as fraction of equity
min_consensus = 1         # 1-of-2 (loose) or 2 (strict)
symbols = ["BTC/USDC", "ETH/USDC", "SOL/USDC"]

# --- 5.2) dYdX-vs-CEX cross-venue funding carry (Phase 25 #2 T2) ---
[strategies.dydx_cex_carry]
enabled = true             # BTC-USD only (per Phase 25 #2 scope lock)
cap = 0.025                # 1/2 of §7.3 spec value 0.05
notional_per_leg_usd = 125000   # $125k/leg (1/2 of §7.3 spec $250k)

# --- 5.3) Liquidation cascade "fade-the-cascade" (Phase 25 #2 T2D) ---
[strategies.cascade_fade]
enabled = true
max_notional_per_event_usd = 1000000   # $1M/event (per-event cap)
cooldown_hours = 24                   # 24h cooldown between BTC entries

# --- 5.4) SOL funding-flip kill-switch (defensive opt-in) ---
[strategies.funding_flip_kill_switch]
enabled = false            # SOL-only; defensive drop-in

# --- 5.5) HMM 3-state regime-detector meta-plugin (opt-in) ---
[strategies.regime_detector]
enabled = false            # meta-plugin; sized via SizingSignal modifiers

# ======================================================================
# 6) TELEMETRY — log-könyvtár, metrika-intervallum
# ======================================================================
[telemetry]
log_dir = "logs/bot"
metrics_interval_sec = 60   # 1 perc — per-strategy stats frissítés

# ======================================================================
# 7) PORTFOLIO (Phase 37 Track 4) — multi-strategy koordináció
#
# A portfolio-szintű kockázatkezelés a Phase 6 multi-class ensemble
# óta hiányzó réteg. A carry-trade stratégiák (két `dydx_cex_carry`
# variáns, vagy carry + funding-flip) erősen korrelálnak (0.6-0.9)
# a közös funding-rate faktor miatt, és a korrelálatlanul méretezett
# pozíciók a portfolió-DD-t a vártnál jobban megdobhatják.
#
# A 4 mező:
#   total_risk_per_cycle_usd  — ciklusonkénti max új kockázat (USD).
#                                Hard cap: 10 000. Default: 100.
#   correlation_penalty_threshold — a korreláció küszöb (0..1).
#                                Ha két stratégia korrelációja >= ez,
#                                a közös büdzséjük csökken.
#                                Default: 0.7.
#   correlation_window_size   — görgető ablak (trade-ek száma).
#                                Default: 30.
#   max_dd_pct                — a portfolió-szintű circuit breaker
#                                küszöb (0..0.30). Ha a portfolió
#                                drawdown >= ez, MINDEN pozíció
#                                zárul piaci order-ekkel, és a bot
#                                leáll. Default: 0.10.
#
# A Phase 31 audit envelope +41.99%/mo @ ≤7.70% DD — a 10%-os
# default buffer bőven elég. Ha agresszívebb (vagy konzervatívabb)
# beállítást szeretnél, itt override-old.
# ======================================================================
[portfolio]
total_risk_per_cycle_usd = 100
correlation_penalty_threshold = 0.7
correlation_window_size = 30
max_dd_pct = 0.10

# ======================================================================
# 7) TUI / CLI MEGJEGYZÉSEK (Phase 34) — flag-ek, NEM config mezők
# ======================================================================
# A TUI (Ink-alapú terminál-felület) a `mm-bot start` alapértelmezett
# módja. A TUI indítási opciói a PARANCSSORON át adhatók át, NEM ezen
# a TOML konfigon keresztül. Az indítási formák:
#
#   mm-bot start                              # TUI + bot (default)
#   mm-bot start --headless                   # plain text logok + bot
#   mm-bot start --no-color                   # TUI színek nélkül
#   mm-bot start --headless --no-color        # clean text logok
#   mm-bot start --config=./prod.toml         # TUI egyedi configgal
#   mm-bot tui                                # CSAK TUI, nincs bot
#   mm-bot tui --data-source=simulated        # default: szintetikus feed
#   mm-bot tui --data-source=paper            # paper-trading engine mögötte
#   mm-bot tui --seed=42                      # reprodukálható szimuláció
#
# Billentyűkombinációk a TUI-ban (a teljes lista: `docs/production-strategies/tui.md`):
#   [q] / Ctrl-C   — kilépés (graceful: bot is leáll, ha fut)
#   [s]            — start / stop (TUI-only módban N/A)
#   [p]            — pause / resume (TUI-only módban N/A)
#   [k]            — kill-switch (confirm: [i] igen / [n] nem)
#   [Tab] / [←→]   — panel fókusz váltása
#   [t]            — history rendezési kulcs váltása (IDŐ / PNL / SYMBOL)
#   [r]            — manuális frissítés
#   [?]            — help overlay
#
# A TUI soha nem ír bele a position management-be vagy az order
# pipeline-ba — kizárólag a `Bot.subscribe(listener)` API-n keresztül
# olvassa a bot állapotát. A 3-rétegű 1:10 leverage defense-in-depth
# (Zod schema + OrderManager pre-place + PositionManager post-fill)
# változatlan. A TUI egy operátori dashboard, nem egy kontroller.
#
# BUNDLE GARANCIA: `--headless` módban a `@mm-crypto-bot/tui` csomag
# NEM töltődik be (dynamic import guard a `start` parancsban). A
# `headless-no-ink.test.ts` teszt ezt 3 független módon ellenőrzi
# (static source check + `bun build --external` + runtime subprocess).
