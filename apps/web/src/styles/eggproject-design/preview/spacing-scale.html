<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Spacing Scale</title><script src="_theme.js" defer></script>
<style>
  body { padding: 22px 28px; display: flex; flex-direction: column; gap: 14px; justify-content: center; }
  .scale { display: flex; flex-direction: column; gap: 8px; }
  .step { display: grid; grid-template-columns: 56px 1fr 110px; gap: 14px; align-items: center; }
  .step .name { font: var(--ep-text-meta); font-family: var(--ep-font-mono); color: var(--ep-fg-subtle); }
  .step .bar { height: 14px; background: var(--ep-accent); border-radius: 3px; }
  .step .px { font: var(--ep-text-meta); font-family: var(--ep-font-mono); color: var(--ep-fg-faint); text-align: right; }
</style></head>
<body>
  <div class="scale">
    <div class="step"><span class="name">space-1</span><div class="bar" style="width:4px"></div><span class="px">4 px</span></div>
    <div class="step"><span class="name">space-2</span><div class="bar" style="width:8px"></div><span class="px">8 px</span></div>
    <div class="step"><span class="name">space-3</span><div class="bar" style="width:12px"></div><span class="px">12 px</span></div>
    <div class="step"><span class="name">space-4</span><div class="bar" style="width:16px"></div><span class="px">16 px</span></div>
    <div class="step"><span class="name">space-6</span><div class="bar" style="width:24px"></div><span class="px">24 px</span></div>
    <div class="step"><span class="name">space-8</span><div class="bar" style="width:32px"></div><span class="px">32 px</span></div>
    <div class="step"><span class="name">space-12</span><div class="bar" style="width:48px"></div><span class="px">48 px</span></div>
    <div class="step"><span class="name">space-16</span><div class="bar" style="width:64px"></div><span class="px">64 px</span></div>
    <div class="step"><span class="name">space-24</span><div class="bar" style="width:96px"></div><span class="px">96 px</span></div>
  </div>
  <span class="label">4-px base · multiples of 4 only</span>
</body></html>
