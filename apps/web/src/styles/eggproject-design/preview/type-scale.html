<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Type Scale</title><script src="_theme.js" defer></script>
<style>
  body { padding: 18px 28px; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 6px 0; vertical-align: baseline; }
  td.sample { color: var(--ep-fg); }
  td.token  { font: var(--ep-text-meta); color: var(--ep-fg-subtle); font-family: var(--ep-font-mono); text-align: right; }
  td.size   { font: var(--ep-text-meta); color: var(--ep-fg-faint); font-family: var(--ep-font-mono); width: 80px; }
  .display-lg { font: var(--ep-text-display-lg); font-size: 56px; line-height: 1; letter-spacing: -0.02em; }
 .display { font: var(--ep-text-display); font-size: 40px; line-height: 1; letter-spacing: -0.02em; font-weight: 700; color: var(--ep-accent); }
  .h1 { font: var(--ep-text-h1); font-size: 32px; }
  .h3 { font: var(--ep-text-h3); }
  .body { font: var(--ep-text-body); }
  .meta { font: var(--ep-text-meta); }
</style></head>
<body>
  <table>
    <tr><td class="size">96 / 0.95</td><td class="sample display-lg">Display</td><td class="token">--ep-text-display-lg</td></tr>
    <tr><td class="size">40 / 1.0</td><td class="sample display">Display italic</td><td class="token">--ep-text-display</td></tr>
    <tr><td class="size">32 / 1.05</td><td class="sample h1">Heading 1</td><td class="token">--ep-text-h1</td></tr>
    <tr><td class="size">24 / 1.25</td><td class="sample h3">Heading 3 — sans</td><td class="token">--ep-text-h3</td></tr>
    <tr><td class="size">16 / 1.55</td><td class="sample body">Body — comfortable reading</td><td class="token">--ep-text-body</td></tr>
    <tr><td class="size">12 / 1.4</td><td class="sample meta">META · OVERLINE</td><td class="token">--ep-text-meta</td></tr>
  </table>
</body></html>
