<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Logo Primary</title><script src="_theme.js" defer></script>
<style>
  body { display: flex; align-items: center; justify-content: center; gap: 56px; padding: 24px 40px; }
  .lockup { display: flex; align-items: center; gap: 16px; }
  .lockup img { width: 64px; height: 64px; }
  .word {
    font-family: var(--ep-font-sans);
    font-weight: 600;
    font-size: 38px;
    line-height: 1;
    color: var(--ep-fg);
    letter-spacing: -0.025em;
    display: inline-flex;
    align-items: baseline;
    gap: 6px;
  }
  .word .dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--ep-accent);
    border-radius: 50%;
    margin-bottom: 4px;
  }
  .divider { width: 1px; height: 80px; background: var(--ep-divider); }
  .sizes { display: flex; align-items: center; gap: 24px; }
  .sizes img { display: block; }
</style></head>
<body>
  <div class="lockup">
    <img src="../assets/logo-mark.svg" alt="EggProject mark">
    <span class="word">EggProject<span class="dot"></span></span>
  </div>
  <div class="divider"></div>
  <div class="sizes">
    <img src="../assets/logo-mark.svg" alt="" style="width:80px;height:80px">
    <img src="../assets/logo-mark.svg" alt="" style="width:48px;height:48px">
    <img src="../assets/logo-mark.svg" alt="" style="width:28px;height:28px">
  </div>
</body></html>
