<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Motion</title><script src="_theme.js" defer></script>
<style>
  body { padding: 24px 28px; display: flex; flex-direction: column; gap: 14px; justify-content: center; }
  .lane { display: grid; grid-template-columns: 110px 1fr 90px; gap: 12px; align-items: center; }
  .lane .name { font: 600 13px var(--ep-font-sans); }
  .lane .desc { font: var(--ep-text-meta); font-family: var(--ep-font-mono); color: var(--ep-fg-subtle); text-align: right; }
  .track { position: relative; height: 24px; background: var(--ep-accent-bg); border-radius: var(--ep-radius-pill); overflow: hidden; }
  .ball {
    position: absolute; top: 4px; left: 4px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--ep-accent);
    animation-duration: 2.4s; animation-iteration-count: infinite;
  }
  .b1 { animation-name: slide; animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1); }
  .b2 { animation-name: slide; animation-timing-function: cubic-bezier(0.65, 0, 0.35, 1); }
  .b3 { animation-name: slide; animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes slide {
    0%, 10%   { left: 4px; }
    50%       { left: calc(100% - 20px); }
    90%, 100% { left: calc(100% - 20px); }
  }
</style></head>
<body>
  <div class="lane"><span class="name">ease-out</span><div class="track"><div class="ball b1"></div></div><span class="desc">220ms · default</span></div>
  <div class="lane"><span class="name">ease-in-out</span><div class="track"><div class="ball b2"></div></div><span class="desc">360ms · pageflow</span></div>
  <div class="lane"><span class="name">spring</span><div class="track"><div class="ball b3"></div></div><span class="desc">220ms · tactile</span></div>
  <span class="label">Motion is restrained — fades, slides, gentle springs; never bounces or shakes</span>
</body></html>
