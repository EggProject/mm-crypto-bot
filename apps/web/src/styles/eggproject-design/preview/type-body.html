<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Body Type</title><script src="_theme.js" defer></script>
<style>
  body { padding: 22px 32px; display: flex; flex-direction: column; gap: 8px; justify-content: center; }
  .a { font: 600 32px/1.1 var(--ep-font-sans); letter-spacing: -0.02em; }
  .b { font: 500 20px/1.4 var(--ep-font-sans); color: var(--ep-fg); }
  .c { font: 400 16px/1.55 var(--ep-font-sans); color: var(--ep-fg-muted); max-width: 580px; }
  .d { font: 400 13px/1.5 var(--ep-font-sans); color: var(--ep-fg-subtle); }
  .row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 4px; }
</style></head>
<body>
  <div class="a">Crafted code, shipped on time.</div>
  <div class="b">Lead paragraph — sets context.</div>
  <div class="c">Body copy at 16/1.55 with Roboto regular. Calm grey on cream paper gives a calm, premium reading rhythm without sacrificing technical clarity.</div>
  <div class="d">Small / caption · 13px · subtle slate</div>
  <div class="row"><span class="label">Roboto · 300 · 400 · 500 · 700</span><span class="meta">var(--ep-font-sans)</span></div>
</body></html>
